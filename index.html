function startExam() {
  const wt = document.getElementById('examWorkType').value;
  const judgeCount = parseInt(document.getElementById('examJudgeCount').value) || 0;
  const singleCount = parseInt(document.getElementById('examSingleCount').value) || 0;
  const timerMinutes = parseInt(document.getElementById('examTimer').value) || 0;

  if (judgeCount + singleCount === 0) {
    alert('请设置至少一题。');
    return;
  }

  // Filter questions
  let judgePool = ALL_QUESTIONS.filter(q => q.type === 'judge');
  let singlePool = ALL_QUESTIONS.filter(q => q.type === 'single');
  if (wt !== 'all') {
    judgePool = judgePool.filter(q => q.work_type === wt);
    singlePool = singlePool.filter(q => q.work_type === wt);
  }

  if (judgePool.length < judgeCount || singlePool.length < singleCount) {
    alert(`题库不足：判断题需${judgeCount}题（有${judgePool.length}题），单选题需${singleCount}题（有${singlePool.length}题）。请减少题目数量。`);
    return;
  }

  // Dedup: track used texts across both pools
  var usedTexts = {};
  var judgeSel = [], singleSel = [];
  shuffleArray(judgePool).forEach(function(q) {
    if (judgeSel.length < judgeCount && !usedTexts[q.text]) {
      judgeSel.push(q); usedTexts[q.text] = true;
    }
  });
  shuffleArray(singlePool).forEach(function(q) {
    if (singleSel.length < singleCount && !usedTexts[q.text]) {
      singleSel.push(q); usedTexts[q.text] = true;
    }
  });
  // Judges first, singles second (not shuffled)
  state.examQuestions = judgeSel.concat(singleSel);
  state.examAnswers = {};
  state.examSubmitted = false;

  // Timer
  if (timerMinutes > 0) {
    state.examTimeLeft = timerMinutes * 60;
    startExamTimer();
  } else {
    state.examTimeLeft = 0;
  }

  document.getElementById('examSetup').style.display = 'none';
  document.getElementById('examArea').style.display = 'block';

  renderExam();
  switchSubTab('exam-mode');
  closeSidebar();
}

function startExamTimer() {
  if (state.examTimer) clearInterval(state.examTimer);
  state.examTimer = setInterval(() => {
    state.examTimeLeft--;
    updateExamTimerDisplay();
    if (state.examTimeLeft <= 0) {
      clearInterval(state.examTimer);
      state.examTimer = null;
      alert('时间到！自动交卷。');
      submitExam();
    }
  }, 1000);
}

function updateExamTimerDisplay() {
  const el = document.getElementById('examTimerDisplay');
  if (!el) return;
  const m = Math.floor(state.examTimeLeft / 60);
  const s = state.examTimeLeft % 60;
  el.textContent = `⏱ ${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
  if (state.examTimeLeft < 60) el.classList.add('warning');
  else el.classList.remove('warning');
}

function renderExam() {
  const area = document.getElementById('examArea');
  const qs = state.examQuestions;

  let html = '<div class="exam-layout">';

  // === LEFT: Questions ===
  html += '<div class="exam-questions">';
  qs.forEach((q, i) => {
    const userAns = state.examAnswers[i];
    html += `<div class="question-display" id="exam-q-${i}" style="margin-bottom:12px;">
      <div class="q-number">第 ${i+1} 题 | ${q.work_type} | ${q.type === 'judge' ? '判断题' : '单选题'} ${userAns !== undefined ? '✅ 已答' : '⬜ 未答'}</div>
      <div class="q-text">${q.text}</div>`;

    if (q.type === 'single' && q.options && q.options.length > 0) {
      q.options.forEach(opt => {
        const letter = opt.charAt(0);
        const selected = userAns === letter ? ' selected' : '';
        html += `<button class="q-option${selected}" onclick="examSelect(${i}, '${letter}')" ${state.examSubmitted ? 'disabled' : ''}>${opt}</button>`;
      });
    } else {
      const selectedT = userAns === '对' ? ' selected' : '';
      const selectedF = userAns === '错' ? ' selected' : '';
      html += `<button class="q-option${selectedT}" onclick="examSelect(${i}, '对')" ${state.examSubmitted ? 'disabled' : ''}>对</button>
      <button class="q-option${selectedF}" onclick="examSelect(${i}, '错')" ${state.examSubmitted ? 'disabled' : ''}>错</button>`;
    }

    if (state.examSubmitted) {
      const isCorrect = userAns === q.answer;
      html += `<div class="q-feedback ${isCorrect ? 'correct' : 'wrong'}">
        ${isCorrect ? '✅ 正确' : '❌ 错误，正确答案：' + q.answer + (userAns !== undefined ? '，你的答案：'+userAns : '')}
      </div>`;
    }
    html += '</div>';
  });
  html += '</div>'; // close exam-questions

  // === RIGHT: Timer + Answer Card + Submit ===
  html += '<div class="exam-panel">';

  if (state.examTimeLeft > 0) {
    html += '<div class="exam-timer" id="examTimerDisplay">⏱ ' + formatTime(state.examTimeLeft) + '</div>';
  }

  // Answer card
  html += '<div class="exam-card"><div style="font-size:13px;color:var(--text-muted);margin-bottom:8px;font-weight:500;">📋 答题卡</div><div style="display:flex;flex-wrap:wrap;gap:4px;">';
  qs.forEach((q, i) => {
    const answered = state.examAnswers[i] !== undefined;
    const isCorrect = state.examSubmitted ? (state.examAnswers[i] === q.answer) : false;
    let borderColor, bgColor, textColor;
    if (state.examSubmitted) {
      if (isCorrect) { borderColor = 'var(--accent-green)'; bgColor = 'rgba(78,205,196,0.15)'; textColor = 'var(--accent-green)'; }
      else if (answered) { borderColor = 'var(--accent-red)'; bgColor = 'rgba(232,85,80,0.15)'; textColor = 'var(--accent-red)'; }
      else { borderColor = 'var(--border-color)'; bgColor = 'var(--bg-secondary)'; textColor = 'var(--text-muted)'; }
    } else {
      borderColor = answered ? 'var(--accent-green)' : 'var(--border-color)';
      bgColor = answered ? 'rgba(78,205,196,0.1)' : 'var(--bg-secondary)';
      textColor = answered ? 'var(--accent-green)' : 'var(--text-muted)';
    }
    html += '<button onclick="examGoTo(' + i + ')" style="padding:6px 10px;font-size:12px;border:1px solid ' + borderColor + ';background:' + bgColor + ';color:' + textColor + ';border-radius:4px;cursor:pointer;">' + (i+1) + '</button>';
  });
  html += '</div></div>'; // close answer card

  // Submit
  if (!state.examSubmitted) {
    var a = Object.keys(state.examAnswers).length;
    var t = state.examQuestions.length;
    html += '<div class="exam-submit"><span style="color:var(--text-secondary);font-size:13px;">已答 ' + a + '/' + t + ' 题</span><button class="pr" onclick="submitExam()" style="display:block;width:100%;margin-top:8px;">✓ 交卷</button></div>';
  }

  html += '</div>'; // close exam-panel
  html += '</div>'; // close exam-layout

  area.innerHTML = html;
  if (state.examTimeLeft > 0) updateExamTimerDisplay();
}

function examSelect(idx, answer) {
  if (state.examSubmitted) return;
  state.examAnswers[idx] = answer;
  renderExam();
}

function examGoTo(idx) {
  const el = document.getElementById(`exam-q-${idx}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function submitExam() {
  if (state.examSubmitted) return;

  const answered = Object.keys(state.examAnswers).length;
  const total = state.examQuestions.length;

  if (answered < total) {
    if (!confirm(`还有 ${total - answered} 题未作答，确定要交卷吗？`)) return;
  }

  if (state.examTimer) {
    clearInterval(state.examTimer);
    state.examTimer = null;
  }

  state.examSubmitted = true;

  // Calculate score
  let correct = 0;
  const wrongList = [];
  state.examQuestions.forEach((q, i) => {
    if (state.examAnswers[i] === q.answer) {
      correct++;
    } else {
      wrongList.push({q, userAnswer: state.examAnswers[i] || '未作答', index: i});
    }
  });

  // Score: each question contributes equally to 100
  const pointsPerQuestion = 100 / total;
  const score = Math.round(correct * pointsPerQuestion * 10) / 10;

  // Save exam record
  const record = {
    date: new Date().toLocaleString(),
    total,
    correct,
    score,
    wrongCount: total - correct,
    details: wrongList.map(w => ({
      text: w.q.text,
      answer: w.q.answer,
      userAnswer: w.userAnswer,
      workType: w.q.work_type,
      type: w.q.type
    }))
  };
  state.examRecords.push(record);
  localStorage.setItem('examRecords', JSON.stringify(state.examRecords));

  // Also add wrong answers to wrong book
  wrongList.forEach(w => addToWrongBook(w.q));

  // Show results before rendering exam
  renderExam();

  // Add score box at top
  const area = document.getElementById('examArea');
  const scoreHtml = `<div class="stats-box">
    <div class="big-number">${score}</div>
    <div style="font-size:14px;color:var(--text-muted);margin-top:4px;">总分（满分100）</div>
    <div class="stats-detail">
      <div class="stat-item"><span class="num" style="color:var(--accent-green);">${correct}</span><span class="label">正确</span></div>
      <div class="stat-item"><span class="num" style="color:var(--accent-red);">${total - correct}</span><span class="label">错误</span></div>
      <div class="stat-item"><span class="num" style="color:var(--accent-blue);">${total}</span><span class="label">总题</span></div>
    </div>
    <div class="question-nav" style="justify-content:center;margin-top:12px;">
      <button onclick="resetExam()">🔄 重新考试</button>
    </div>
  </div>`;

  area.innerHTML = scoreHtml + area.innerHTML;
}

function resetExam() {
  state.examQuestions = [];
  state.examAnswers = {};
  state.examSubmitted = false;
  if (state.examTimer) {
    clearInterval(state.examTimer);
    state.examTimer = null;
  }
  document.getElementById('examSetup').style.display = 'block';
  document.getElementById('examArea').style.display = 'none';
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
}

// ============================================================
// WRONG BOOK
// ============================================================
function addToWrongBook(q) {
  const wq = state.wrongQuestions;
  // Check if already exists
  const exists = wq.some(w => w.text === q.text);
  if (!exists) {
    wq.push(q);
    localStorage.setItem('wrongQuestions', JSON.stringify(wq));
  }
}


function showWrongBook() {
  switchModule('practice');
  switchSubTab('wrong-book');
  updateWrongBookDisplay();
  closeSidebar();
}

function updateWrongBookDisplay() {
  const container = document.getElementById('wrongBookContent');
  const wq = state.wrongQuestions;

  if (wq.length === 0) {
    container.innerHTML = `<div class="stats-box">
      <div style="font-size:40px;margin-bottom:10px;">📕</div>
      <p style="color:var(--text-muted);">错题本为空，继续加油！</p>
    </div>`;
    return;
  }

  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
    <h3 style="color:var(--accent-orange);">错题本（${wq.length}题）</h3>
    <div style="display:flex;gap:8px;">
      <button onclick="clearWrongBook()" style="padding:6px 14px;background:none;border:1px solid var(--accent-red);color:var(--accent-red);border-radius:var(--radius);cursor:pointer;font-size:12px;font-family:inherit;">清空错题本</button>
    </div>
  </div>
  <div class="wrong-book">`;

  wq.forEach((q, idx) => {
    html += `<div class="wrong-item">
      <div class="q-meta">
        <span class="q-type-badge ${q.type}">${q.type === 'judge' ? '判断题' : '单选题'}</span>
        ${q.work_type}
      </div>
      <div class="q-text">${q.text}</div>
      <div class="q-answer-text">正确答案：${q.answer}</div>
      <div style="margin-top:8px;">
        <button class="btn-remove" onclick="removeFromWrongBook(${idx})">移出错题本</button>
      </div>
    </div>`;
  });

  html += '</div>';
  container.innerHTML = html;
}

function removeFromWrongBook(idx) {
  state.wrongQuestions.splice(idx, 1);
  localStorage.setItem('wrongQuestions', JSON.stringify(state.wrongQuestions));
  updateWrongBookDisplay();
}

function clearWrongBook() {
  if (!confirm('确定要清空错题本吗？')) return;
  state.wrongQuestions = [];
  localStorage.setItem('wrongQuestions', JSON.stringify(state.wrongQuestions));
  updateWrongBookDisplay();
}

// ============================================================
function switchModule(moduleName) {
  // Switch main content
  document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));

  document.getElementById('module-' + moduleName).classList.add('active');
  document.querySelector(`.nav-btn[data-module="${moduleName}"]`).classList.add('active');
  state.currentModule = moduleName;

  // Switch sidebar content with slide-bounce animation
  document.querySelectorAll('.sidebar-panel').forEach(p => {
    p.style.display = 'none';
    p.classList.remove('sbpc-panel');
  });
  var targetPanel = document.getElementById('sidebar-' + moduleName);
  targetPanel.style.display = 'block';
  // Force reflow so animation replays
  void targetPanel.offsetWidth;
  targetPanel.classList.add('sbpc-panel');

  // Update nav slider position
  updateNavSlider();

  // Init subtab slider when switching to practice
  if (moduleName === 'practice') {
    setTimeout(updateSubtabSlider, 80);
  }
  // Reset chapter filter when switching to knowledge
  if (moduleName === 'knowledge') {
    document.querySelectorAll('.tree-item-header').forEach(function(h) { h.classList.remove('active-chapter'); });
  }
}


function updateNavSlider() {
  const activeBtn = document.querySelector('.nav-btn.active');
  const slider = document.getElementById('navSlider');
  if (!activeBtn || !slider) return;
  slider.style.left = activeBtn.offsetLeft + 'px';
  slider.style.width = activeBtn.offsetWidth + 'px';
}

function switchSubTab(subtabName) {
  document.querySelectorAll('.practice-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.practice-subtab').forEach(t => t.classList.remove('active'));

  document.getElementById('panel-' + subtabName).classList.add('active');
  document.querySelector(`.practice-subtab[data-subtab="${subtabName}"]`).classList.add('active');

  // Update subtab slider position
  updateSubtabSlider();
  // Switch sidebar content to match the active subtab
  updatePracticeSidebar(subtabName);
}

function updateSubtabSlider() {
  const activeTab = document.querySelector('.practice-subtab.active');
  const slider = document.getElementById('subtabSlider');
  if (!activeTab || !slider) return;
  slider.style.left = activeTab.offsetLeft + 'px';
  slider.style.width = activeTab.offsetWidth + 'px';
}

function initEvents() {
  // Top nav
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      switchModule(this.dataset.module);
    });

    document.getElementById('sidebar').classList.remove('open');

function highlightPreset(el) {
  var btns = el.parentElement.querySelectorAll('.preset-btn');
  btns.forEach(function(b) { b.classList.remove('active'); });
  el.classList.add('active');
}

function syncPreset(input) {
  // Clamp value to valid range
  var max = parseInt(input.max);
  var min = parseInt(input.min) || 0;
  var val = parseInt(input.value);
  if (isNaN(val) || val < min) { val = min; input.value = min; }
  else if (val > max) { val = max; input.value = max; }
  else input.value = val;  // normalize (remove leading zeros)
  // Match preset buttons
  var btns = input.parentElement.querySelectorAll('.preset-btn');
  var matched = false;
  btns.forEach(function(b) {
    if (b.textContent === '自定义') return;
    if (parseInt(b.textContent) === val) {
      b.classList.add('active');
      matched = true;
    } else {
      b.classList.remove('active');
    }
  });
  // Highlight custom if no preset matches
  btns.forEach(function(b) {
    if (b.textContent === '自定义') b.classList.toggle('active', !matched);
  });
}


function initMain3DTilt() {
  var baseTrans = {
    main: 'width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), padding 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)',
    sidebar: 'width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)',
    nav: 'padding 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)'
  };
  function addTilt(selector, sensY, sensX, key) {
    var el = document.querySelector(selector);
    if (!el) return;
    el.addEventListener('mousemove', function(e) {
      var viewCenterX = window.innerWidth / 2;
      var viewCenterY = window.innerHeight / 2;
      var rotateY = ((e.clientX - viewCenterX) / viewCenterX) * sensY;
      var rotateX = ((viewCenterY - e.clientY) / viewCenterY) * sensX;
      el.style.transform = 'perspective(1200px) rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg)';
    });
    el.addEventListener('mouseleave', function() {
      el.style.transform = '';
      el.style.transition = 'transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1)' + (baseTrans[key] ? ', ' + baseTrans[key] : '');
    });
    el.addEventListener('mouseenter', function() {
      el.style.transition = 'transform 0.08s ease-out' + (baseTrans[key] ? ', ' + baseTrans[key] : '');
    });
  }
  addTilt('.main-content', 2, 0.3, 'main');
  addTilt('.sidebar', 1.5, 1, 'sidebar');
  addTilt('.top-nav', 1.2, 0.5, 'nav');
}

function addCardTiltEffect() {
  const cards = document.querySelectorAll('#qbankContent .q-card, .question-display');
  cards.forEach(function(card) {
    card.addEventListener('mousemove', function(e) {
      const rect = this.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      const rotateX = (centerY - y) / 12;
      const rotateY = (x - centerX) / 12;
      this.style.transform = 'perspective(800px) rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg) translateZ(12px)';
      this.style.boxShadow = '0 12px 40px rgba(0,0,0,0.4), 0 0 30px rgba(78,205,196,0.08)';
    });
    card.addEventListener('mouseleave', function() {
      this.style.transform = 'perspective(800px) rotateX(0) rotateY(0) translateZ(0)';
      this.style.boxShadow = '';
      this.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.5s ease';
    });
    card.addEventListener('mouseenter', function() {
      this.style.transition = 'transform 0.1s ease';
    });
  });
}



function toggleCustomSelect(el) {
  const wrap = el.closest('.custom-select-wrap');
  const isOpen = wrap.classList.contains('open');
  // Close all other custom selects
  document.querySelectorAll('.custom-select-wrap.open').forEach(w => w.classList.remove('open'));
  if (!isOpen) {
    wrap.classList.add('open');
    // Animate panel items with stagger
    const items = wrap.querySelectorAll('.custom-select-option');
    items.forEach((item, i) => {
      item.style.animation = 'none';
      item.offsetHeight; // trigger reflow
      item.style.animation = `fadeInUp 0.3s ease forwards ${i * 0.04}s`;
    });
  }
}

function selectCustomOption(el) {
  const wrap = el.closest('.custom-select-wrap');
  if (!wrap) return;
  var label = wrap.querySelector('.custom-select-trigger span');
  var panel = wrap.querySelector('.custom-select-panel');
  var selectId = wrap.id.replace('Wrap', '');
  var select = document.getElementById(selectId);
  if (label) label.textContent = el.textContent;
  if (panel) {
    panel.querySelectorAll('.custom-select-option').forEach(function(o) { o.classList.remove('selected'); });
    el.classList.add('selected');
  }
  if (select) select.value = el.dataset.value;
  wrap.classList.remove('open');
  // Update count limits when practice/exam work type changes
  if (selectId === 'practiceWorkType' || selectId === 'examWorkType') updateCountLimits();
}

function updateCountLimits() {
  var pwt = document.getElementById('practiceWorkType');
  if (pwt) {
    var wt = pwt.value;
    var jm = ALL_QUESTIONS.filter(function(q) { return q.type === 'judge' && (wt === 'all' || q.work_type === wt); }).length;
    var sm = ALL_QUESTIONS.filter(function(q) { return q.type === 'single' && (wt === 'all' || q.work_type === wt); }).length;
    var pj = document.getElementById('practiceJudgeCount');
    var ps = document.getElementById('practiceSingleCount');
    if (pj) { pj.max = jm; showMax(pj, jm); }
    if (ps) { ps.max = sm; showMax(ps, sm); }
  }
  var ewt = document.getElementById('examWorkType');
  if (ewt) {
    var wt2 = ewt.value;
    var jm2 = ALL_QUESTIONS.filter(function(q) { return q.type === 'judge' && (wt2 === 'all' || q.work_type === wt2); }).length;
    var sm2 = ALL_QUESTIONS.filter(function(q) { return q.type === 'single' && (wt2 === 'all' || q.work_type === wt2); }).length;
    var ej = document.getElementById('examJudgeCount');
    var es = document.getElementById('examSingleCount');
    if (ej) { ej.max = jm2; showMax(ej, jm2); }
    if (es) { es.max = sm2; showMax(es, sm2); }
  }
}
function showMax(input, max) {
  var el = input.parentNode.querySelector('.max-hint');
  if (!el) { el = document.createElement('span'); el.className = 'max-hint'; input.parentNode.appendChild(el); }
  el.textContent = '上限 ' + max + ' 题';
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.custom-select-wrap')) {
    document.querySelectorAll('.custom-select-wrap.open').forEach(w => w.classList.remove('open'));
  }
});

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
