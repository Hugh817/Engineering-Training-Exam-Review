<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工训机考复习</title>

<style>
/* ===== GLOBAL RESET & VARIABLES ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #0f1320;
  --bg-secondary: #161b2e;
  --bg-card: #1a2140;
  --bg-sidebar: #0a0f1e;
  --text-primary: #e0e4f0;
  --text-secondary: #9aa4c8;
  --text-muted: #5a6488;
  --accent-green: #4ecdc4;
  --accent-blue: #5b8def;
  --accent-orange: #f0a030;
  --accent-red: #e85550;
  --accent-purple: #8b5cf6;
  --border-color: #1e2a50;
  --sidebar-width: 320px;
  --sidebar-collapsed: 80px;
  --header-height: 52px;
  --radius: 8px;
  --transition: 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  --glow-green: rgba(78, 205, 196, 0.3);
}
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(78, 205, 196, 0.07) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(91, 141, 239, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(240, 160, 48, 0.04) 0%, transparent 50%),
    linear-gradient(135deg, #070b17 0%, #0f1426 30%, #0a0f1e 60%, #0f1a2e 100%);
  background-attachment: fixed;
  color: var(--text-primary);
  line-height: 1.7;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden auto;
}
a { color: var(--accent-blue); text-decoration: none; }
a:hover { color: var(--accent-green); }

/* ===== TOP NAV ===== */
.top-nav {
  width: 100%;
  max-width: 1064px;
  display: flex;
  justify-content: center;
  padding: 32px 32px 16px;
  flex-shrink: 0;
  pointer-events: none;
}
.nav-inner {
  position: relative;
  display: flex;
  justify-content: center;
  gap: 2px;
  padding: 6px 6px;
  background: rgba(8, 12, 25, 0.4);
  backdrop-filter: blur(16px) saturate(200%);
  -webkit-backdrop-filter: blur(16px) saturate(200%);
  border: 1px solid rgba(78, 205, 196, 0.08);
  border-radius: 16px;
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3), 0 0 20px rgba(78, 205, 196, 0.03);
  pointer-events: auto;
}
.nav-btn {
  padding: 7px 22px 9px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 500;
  transition: color 0.2s ease;
  position: relative;
  z-index: 2;
  white-space: nowrap;
}
.nav-btn:hover { color: var(--text-primary); }
.nav-btn.active { color: var(--accent-green); }

/* Sliding block */
.nav-slider {
  position: absolute;
  top: 4px;
  bottom: 4px;
  left: 6px;
  background: linear-gradient(135deg, rgba(78, 205, 196, 0.15), rgba(78, 205, 196, 0.08));
  border: 1px solid rgba(78, 205, 196, 0.25);
  border-radius: 10px;
  transition: left 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 1;
  box-shadow: 0 0 20px var(--glow-green), inset 0 1px 0 rgba(78, 205, 196, 0.15);
}

/* Keep button text above slider */
.nav-btn {
  z-index: 2;
  position: relative;
}

/* ===== APP BODY (sidebar + content) ===== */
.app-body {
  display: flex;
  flex: 1;
  min-height: 0;
  perspective: 1200px;
  perspective-origin: center;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar-width);
  flex-shrink: 0;
  background: rgba(8, 12, 25, 0.35);
  backdrop-filter: blur(20px) saturate(200%);
  -webkit-backdrop-filter: blur(20px) saturate(200%);
  display: flex;
  flex-direction: column;
  transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  margin: 32px 12px 32px 32px;
  border-radius: 14px;
  border: 1px solid rgba(78, 205, 196, 0.08);
  box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(78, 205, 196, 0.03);
}
.sidebar-header {
  padding: 12px 14px;
  border-bottom: 1px solid rgba(78, 205, 196, 0.06);
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 52px;
  background: rgba(255, 255, 255, 0.02);
}
.sidebar-header .logo-icon {
  font-size: 20px;
  color: var(--accent-green);
  flex-shrink: 0;
  width: 32px;
  text-align: center;
}
.sidebar-header h1 {
  font-size: 16px;
  color: var(--accent-green);
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  transition: var(--transition);
}
.sidebar-toggle {
  margin-left: auto;
  background: none;
  border: 1px solid var(--border-color);
  color: var(--text-muted);
  width: 28px;
  height: 28px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  flex-shrink: 0;
  font-size: 12px;
}
.sidebar-toggle:hover {
  color: var(--accent-green);
  border-color: var(--accent-green);
  box-shadow: 0 0 8px var(--glow-green);
}
.sidebar-text {
  transition: opacity 0.15s ease;
  white-space: nowrap;
}

/* Collapsed state */
.sidebar-collapsed .sidebar {
  width: var(--sidebar-collapsed);
  margin: 32px 12px 32px 32px;
}
.sidebar-collapsed .sidebar-text {
  opacity: 0;
  width: 0;
  display: inline-block;
  overflow: hidden;
  pointer-events: none;
}
.sidebar-collapsed .sidebar-header h1 {
  opacity: 0;
  width: 0;
  overflow: hidden;
}
.sidebar-collapsed .sidebar-toggle {
  margin-left: auto;
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  background: rgba(10, 15, 30, 0.6);
  border: 1px solid rgba(78, 205, 196, 0.08);
  border-radius: 6px;
  z-index: 10;
}
.sidebar-collapsed .sidebar-header {
  padding: 12px 6px;
  justify-content: center;
  gap: 4px;
}
.sidebar-collapsed .sidebar-toggle:hover {
  border-color: var(--accent-green);
  box-shadow: 0 0 12px var(--glow-green);
}
.sidebar-collapsed .tree-item-header {
  padding: 8px 10px;
  justify-content: center;
}
.sidebar-collapsed .tree-item-header .sidebar-text {
  display: none;
}
.sidebar-collapsed .tree-leaf {
  padding: 6px 10px;
  text-align: center;
  font-size: 0;
}
.sidebar-collapsed .work-type-item {
  padding: 10px 10px;
  justify-content: center;
}
.sidebar-collapsed .work-type-item .count,
.sidebar-collapsed .work-type-item .sidebar-text {
  display: none;
}
.sidebar-collapsed .practice-settings label,
.sidebar-collapsed .practice-settings h3,
.sidebar-collapsed .practice-settings .btn-start,
.sidebar-collapsed .practice-settings select,
.sidebar-collapsed .practice-settings .custom-select-wrap,
.sidebar-collapsed .practice-settings input,
.sidebar-collapsed .practice-settings .max-hint,
.sidebar-collapsed .practice-settings .preset-btn,
.sidebar-collapsed .practice-settings hr {
  display: none;
}

.sidebar-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 8px 0;
}
.sidebar-content::-webkit-scrollbar { width: 4px; }
.sidebar-content::-webkit-scrollbar-track { background: transparent; }
.sidebar-content::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

/* Knowledge sidebar tree */
.tree-item {
  padding: 0;
}
.tree-item-header {
  display: flex;
  align-items: center;
  padding: 8px 16px;
  cursor: pointer;
  transition: var(--transition);
  gap: 8px;
  font-size: 13px;
  color: var(--text-secondary);
}
.tree-item-header:hover {
  background: rgba(78, 205, 196, 0.08);
  color: var(--text-primary);
}
.tree-item-header i {
  width: 16px;
  font-size: 10px;
  color: var(--accent-blue);
  transition: transform var(--transition);
}
.tree-item-header i.expanded { transform: rotate(90deg); }
.tree-item-header .indent { margin-left: 24px; }
.tree-children { display: none; }
.tree-children.open { display: block; }
.tree-leaf {
  padding: 6px 16px 6px 48px;
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
  transition: var(--transition);
  display: block;
  background: none;
  border: none;
  width: 100%;
  text-align: left;
  font-family: inherit;
}
.tree-leaf:hover { color: var(--accent-blue); background: rgba(69, 183, 209, 0.06); }

/* Question bank sidebar */
.work-type-list { padding: 8px 0; }
.work-type-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  cursor: pointer;
  transition: var(--transition);
  font-size: 13px;
  color: var(--text-secondary);
  background: none;
  border: none;
  width: 100%;
  text-align: left;
  font-family: inherit;
}
.work-type-item:hover { background: rgba(78, 205, 196, 0.08); color: var(--text-primary); }
.work-type-item.active { color: var(--accent-green); background: rgba(78, 205, 196, 0.12); }
.work-type-item .count {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-primary);
  padding: 2px 8px;
  border-radius: 10px;
}

/* Practice sidebar content */
.practice-settings { padding: 16px; }
.practice-settings label {
  display: block;
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 6px;
  margin-top: 14px;
}
.practice-settings select, .practice-settings input {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg-primary);
  color: var(--text-primary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  font-size: 13px;
  font-family: inherit;
}
.practice-settings select:focus, .practice-settings input:focus {
  outline: none;
  border-color: var(--accent-green);
}
.count-input-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.count-input-group input[type="number"] {
  width: 100%;
}
.max-hint{color:var(--accent-orange);font-size:12px;font-weight:500;margin-left:6px}
.preset-btns {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.preset-btn {
  padding: 4px 12px;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  color: var(--text-muted);
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}
.preset-btn:hover {
  border-color: var(--accent-green);
  color: var(--accent-green);
}
.preset-btn.active {
  background: rgba(78, 205, 196, 0.15);
  border-color: var(--accent-green);
  color: var(--accent-green);
}
.btn-start {
  width: 100%;
  padding: 10px;
  margin-top: 18px;
  background: var(--accent-green);
  color: #0a0a1a;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}
.btn-start:hover { background: #3dbeb6; transform: translateY(-1px); }

/* ===== MAIN CONTENT ===== */
.main-content {
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: padding 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.content-inner {
  width: 100%;
  max-width: 1000px;
  padding: 20px 32px 60px;
  background: rgba(10, 15, 30, 0.3);
  backdrop-filter: blur(12px) saturate(150%);
  -webkit-backdrop-filter: blur(12px) saturate(150%);
  border-radius: var(--radius);
  border: 1px solid rgba(78, 205, 196, 0.06);
  box-shadow: 0 8px 40px rgba(0, 0, 0, 0.2);
}

/* Module containers */
.module { display: none; }
.module.active { display: block; animation: moduleEnter 0.75s ease-out; }
@keyframes moduleEnter { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* Exam two-column layout */
.exam-layout{display:flex;gap:20px;align-items:flex-start}
.exam-questions{flex:1;min-width:0}
.exam-panel{width:220px;flex-shrink:0;position:sticky;top:80px}
.exam-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;padding:12px;margin-top:12px}
.exam-submit{background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;padding:12px;margin-top:12px;text-align:center}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== KNOWLEDGE STYLES ===== */
.knowledge-container h2.chapter-title {
  color: var(--accent-green);
  font-size: 22px;
  margin: 32px 0 16px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--accent-green);
  scroll-margin-top: 20px;
}
.knowledge-container h3.section-title {
  color: var(--accent-orange);
  font-size: 17px;
  margin: 20px 0 10px;
  scroll-margin-top: 20px;
}
.knowledge-container h4.subsection-title {
  color: var(--accent-green);
  font-size: 15px;
  margin: 14px 0 8px;
  scroll-margin-top: 20px;
  font-weight: 500;
}
.knowledge-container .para {
  margin: 8px 0;
  font-size: 14.5px;
  line-height: 1.8;
}
.knowledge-container .bullet {
  margin: 4px 0 4px 20px;
  font-size: 14px;
  list-style: none;
  color: var(--text-secondary);
}
.knowledge-container .bullet::before {
  content: '•';
  color: var(--accent-green);
  font-weight: bold;
  display: inline-block;
  width: 1em;
  margin-left: -1em;
}
.knowledge-container .arrow {
  margin: 4px 0 4px 20px;
  font-size: 14px;
  list-style: none;
  color: var(--text-secondary);
}
.knowledge-container .arrow::before {
  content: '▸';
  color: var(--accent-blue);
  display: inline-block;
  width: 1em;
  margin-left: -1em;
}
.knowledge-container .enum-item {
  margin: 4px 0 4px 20px;
  font-size: 14px;
  color: var(--text-secondary);
}

/* ===== QUESTION BANK STYLES ===== */
.qbank-controls {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}
/* Animated custom dropdown */
.sidebar .custom-select-wrap { overflow: visible; }
.custom-select-wrap {
  position: relative;
  min-width: 150px;
}
.custom-select-trigger {
  padding: 8px 14px;
  padding-right: 32px;
  background: var(--bg-secondary);
  color: var(--text-primary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: border-color 0.3s, box-shadow 0.3s;
  user-select: none;
  position: relative;
  z-index: 2;
}
.custom-select-trigger:hover {
  border-color: var(--accent-green);
  box-shadow: 0 0 8px var(--glow-green);
}
.custom-select-trigger::after {
  content: '';
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  border-left: 5px solid transparent;
  border-right: 5px solid transparent;
  border-top: 5px solid var(--text-muted);
  transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.custom-select-wrap.open .custom-select-trigger::after {
  transform: translateY(-50%) rotate(180deg);
}
.custom-select-panel {
  position: absolute;
  top: calc(100% - 1px);
  left: 0;
  right: 0;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  overflow-y: auto;
  overflow-x: hidden;
  max-height: 0;
  opacity: 0;
  transition: max-height 0.5s ease, opacity 0.35s ease;
  z-index: 10;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}
.custom-select-wrap.open .custom-select-panel {
  max-height: 320px;
  opacity: 1;
}
.custom-select-panel::-webkit-scrollbar { width: 4px; }
.custom-select-panel::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }
.custom-select-option {
  padding: 8px 14px;
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: background 0.12s, color 0.12s, padding-left 0.2s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  font-family: inherit;
}
.custom-select-option:hover {
  background: rgba(78, 205, 196, 0.1);
  color: var(--text-primary);
  padding-left: 20px;
}
.custom-select-option.selected {
  color: var(--accent-green);
  background: rgba(78, 205, 196, 0.08);
}
.btn-toggle-answers {
  padding: 6px 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  border-radius: var(--radius);
  font-size: 13px;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
  white-space: nowrap;
}
.btn-toggle-answers:hover {
  border-color: var(--accent-orange);
  color: var(--accent-orange);
  box-shadow: 0 0 10px rgba(240, 160, 48, 0.15);
}
.btn-toggle-answers.active {
  background: rgba(240, 160, 48, 0.12);
  border-color: var(--accent-orange);
  color: var(--accent-orange);
}
.qbank-stats {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 16px;
}

.q-group {
  margin-bottom: 24px;
  background: rgba(26, 33, 64, 0.85);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid rgba(30, 42, 80, 0.6);
  box-shadow: 0 2px 20px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(78, 205, 196, 0.05);
}
.q-group-header {
  padding: 12px 16px;
  background: var(--bg-secondary);
  font-size: 15px;
  font-weight: 600;
  color: var(--accent-blue);
  border-bottom: 1px solid var(--border-color);
}
.q-card {
  margin: 14px 0;
  padding: 18px 20px;
  background: rgba(26, 33, 64, 0.7);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  border: 1px solid rgba(30, 42, 80, 0.5);
  border-radius: var(--radius);
  box-shadow: 0 2px 16px rgba(0,0,0,0.25);
  animation: fadeInUp 0.35s ease forwards;
  transform-style: preserve-3d;
  will-change: transform;
  cursor: default;
}
.q-card:hover {
  border-color: rgba(78, 205, 196, 0.25);
  box-shadow: 0 8px 40px rgba(0,0,0,0.35), 0 0 20px rgba(78,205,196,0.06);
}
.q-card .q-text {
  font-size: 14px;
  margin-bottom: 8px;
  line-height: 1.6;
}
.q-card .q-meta {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.q-card .q-type-badge {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  margin-right: 6px;
}
.q-type-badge.judge { background: rgba(243, 156, 18, 0.2); color: var(--accent-orange); }
.q-type-badge.single { background: rgba(69, 183, 209, 0.2); color: var(--accent-blue); }
.q-card .q-options {
  margin: 6px 0;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.7;
}
.q-card .q-answer {
  max-height: 0;
  overflow: hidden;
  padding: 0 12px;
  margin-top: 8px;
  background: rgba(78, 205, 196, 0.08);
  border-left: 3px solid var(--accent-green);
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 13px;
  color: var(--accent-green);
  opacity: 1;
  transition: max-height 0.35s ease, padding 0.35s ease;
}
.q-card .q-answer.show { padding: 8px 12px; max-height: 120px; }
.q-card .btn-answer {
  padding: 4px 14px;
  background: none;
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  border-radius: var(--radius);
  font-size: 12px;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}
.q-card .btn-answer:hover {
  border-color: var(--accent-green);
  color: var(--accent-green);
}

/* ===== PRACTICE / EXAM STYLES ===== */
/* Practice subtabs with sliding block - glass style */
.practice-subtabs {
  display: flex;
  justify-content: center;
  margin-bottom: 24px;
  pointer-events: none;
}
.subtab-inner {
  position: relative;
  display: flex;
  gap: 4px;
  padding: 5px 6px;
  background: rgba(8, 12, 25, 0.4);
  backdrop-filter: blur(16px) saturate(200%);
  -webkit-backdrop-filter: blur(16px) saturate(200%);
  border: 1px solid rgba(91, 141, 239, 0.1);
  border-radius: 14px;
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3), 0 0 20px rgba(91, 141, 239, 0.03);
  pointer-events: auto;
}
.practice-subtab {
  padding: 7px 20px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 13px;
  cursor: pointer;
  border-radius: 8px;
  transition: color 0.2s ease;
  font-family: inherit;
  position: relative;
  z-index: 2;
  white-space: nowrap;
}
.practice-subtab:hover { color: var(--text-primary); }
.practice-subtab.active { color: var(--accent-blue); }

.subtab-slider {
  position: absolute;
  top: 4px;
  bottom: 4px;
  left: 6px;
  background: linear-gradient(135deg, rgba(91, 141, 239, 0.15), rgba(91, 141, 239, 0.08));
  border: 1px solid rgba(91, 141, 239, 0.25);
  border-radius: 8px;
  transition: left 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 1;
  box-shadow: 0 0 12px rgba(91, 141, 239, 0.2), inset 0 1px 0 rgba(91, 141, 239, 0.1);
}

.practice-panel { display: none; animation: fadeIn 0.3s ease; }
.practice-panel.active { display: block; }

/* Question display */
.question-display, .stats-box, .wrong-item {
  background: rgba(26, 33, 64, 0.85);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  border-radius: var(--radius);
  padding: 24px;
  margin: 16px 0;
  border: 1px solid rgba(30, 42, 80, 0.6);
  box-shadow: 0 2px 20px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(78, 205, 196, 0.05);
}
.question-display .q-number {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.question-display .q-text {
  font-size: 16px;
  margin-bottom: 16px;
  line-height: 1.7;
}
.question-display .q-option {
  display: block;
  padding: 10px 14px;
  margin: 6px 0;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  cursor: pointer;
  transition: var(--transition);
  font-size: 14px;
  color: var(--text-secondary);
  font-family: inherit;
  width: 100%;
  text-align: left;
}
.question-display .q-option:hover { border-color: var(--accent-blue); }
.question-display .q-option.selected {
  border-color: var(--accent-blue);
  background: rgba(69, 183, 209, 0.1);
  color: var(--text-primary);
}
.question-display .q-option.correct {
  border-color: var(--accent-green);
  background: rgba(78, 205, 196, 0.12);
  color: var(--accent-green);
}
.question-display .q-option.wrong {
  border-color: var(--accent-red);
  background: rgba(231, 76, 60, 0.1);
  color: var(--accent-red);
}
.question-display .q-option.locked { cursor: default; opacity: 0.85; }

.question-display .q-feedback {
  margin-top: 12px;
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 14px;
  animation: fadeIn 0.3s ease;
}
.q-feedback.correct { background: rgba(78, 205, 196, 0.1); color: var(--accent-green); border-left: 3px solid var(--accent-green); }
.q-feedback.wrong { background: rgba(231, 76, 60, 0.1); color: var(--accent-red); border-left: 3px solid var(--accent-red); }

/* Nav buttons */
.question-nav {
  display: flex;
  gap: 10px;
  margin: 16px 0;
  flex-wrap: wrap;
}
.question-nav button {
  padding: 8px 20px;
  border: 1px solid var(--border-color);
  background: var(--bg-secondary);
  color: var(--text-secondary);
  border-radius: var(--radius);
  cursor: pointer;
  transition: var(--transition);
  font-size: 13px;
  font-family: inherit;
}
.question-nav button:hover { border-color: var(--accent-blue); color: var(--text-primary); }
.question-nav button:disabled { opacity: 0.4; cursor: not-allowed; }
.question-nav button.primary {
  background: var(--accent-green);
  color: #0a0a1a;
  border-color: var(--accent-green);
  font-weight: 600;
}
.question-nav button.primary:hover { background: #3dbeb6; }

/* Stats display */
.stats-box {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 20px;
  border: 1px solid var(--border-color);
  text-align: center;
  margin: 16px 0;
}
.stats-box .big-number {
  font-size: 48px;
  font-weight: 700;
  color: var(--accent-green);
}
.stats-box .stats-detail {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.stats-detail .stat-item { text-align: center; }
.stats-detail .stat-item .num { font-size: 24px; font-weight: 600; display: block; }
.stats-detail .stat-item .label { font-size: 12px; color: var(--text-muted); }

/* Wrong question book */
.wrong-book {
  margin-top: 16px;
}
.wrong-book .wrong-item {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
}
.wrong-book .wrong-item .q-text { font-size: 14px; margin-bottom: 6px; }
.wrong-book .wrong-item .q-answer-text { font-size: 12px; color: var(--accent-green); }
.wrong-book .btn-remove {
  padding: 3px 12px;
  background: none;
  border: 1px solid var(--accent-red);
  color: var(--accent-red);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 11px;
  transition: var(--transition);
  font-family: inherit;
}
.wrong-book .btn-remove:hover { background: rgba(231, 76, 60, 0.1); }

/* Exam specific */
.exam-timer {
  font-size: 18px;
  font-weight: 600;
  color: var(--accent-orange);
  text-align: center;
  padding: 12px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
}
.exam-timer.warning { color: var(--accent-red); animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

/* ===== RESPONSIVE ===== */
.menu-toggle {
  display: none;
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 200;
  padding: 8px 12px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 18px;
}
.sidebar-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 99;
}

/* ===== ANIMATIONS & SMOOTH EFFECTS ===== */
/* Card hover lift */
.q-group, .question-display, .stats-box, .wrong-book .wrong-item {
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}
.q-group:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 30px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(78, 205, 196, 0.08);
  border-color: rgba(78, 205, 196, 0.2);
}
.question-display:hover, .stats-box:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 25px rgba(0, 0, 0, 0.35);
}
.wrong-book .wrong-item:hover {
  transform: translateX(4px);
  border-color: rgba(78, 205, 196, 0.15);
}

/* Sidebar items smooth glow */
.tree-item-header:hover, .work-type-item:hover {
  background: rgba(78, 205, 196, 0.08);
  box-shadow: inset 2px 0 0 var(--accent-green);
}

/* Buttons glow pulse */
.btn-start:hover {
  box-shadow: 0 0 24px var(--glow-green);
  transform: translateY(-2px);
}

/* Question options click feedback */
.q-option:active:not(:disabled) {
  transform: scale(0.98);
}

/* Smooth knowledge section scroll highlight */
@keyframes highlightPulse {
  0% { box-shadow: inset 0 0 0 0 rgba(78, 205, 196, 0); }
  50% { box-shadow: inset 0 0 20px 4px rgba(78, 205, 196, 0.1); }
  100% { box-shadow: inset 0 0 0 0 rgba(78, 205, 196, 0); }
}

/* Fade in for dynamically loaded content */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.q-card:nth-child(2) { animation-delay: 0.03s; }
.q-card:nth-child(3) { animation-delay: 0.06s; }

@media (max-width: 768px) {
  .menu-toggle { display: block; }
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    z-index: 100;
    transform: translateX(-100%);
    transition: transform var(--transition);
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.show { display: block; }
  /* On mobile, sidebar-collapsed should not affect the sliding menu */
  .sidebar-collapsed .sidebar {
    width: var(--sidebar-width) !important;
  }
  .sidebar-collapsed .sidebar-text {
    opacity: 1 !important;
    width: auto !important;
    pointer-events: auto !important;
  }
  .sidebar-collapsed .sidebar-header h1 {
    opacity: 1 !important;
    width: auto !important;
  }
  .app-body {
    flex-direction: column;
  }
  .main-content {
    margin-left: 0;
  }
  .content-inner {
    padding: 12px 16px 40px;
  }
  .top-nav {
    padding: 8px 10px;
  }
  .nav-inner {
    padding: 4px;
    gap: 0;
    border-radius: 12px;
  }
  .nav-btn { padding: 5px 12px 7px; font-size: 12px; white-space: nowrap; }
  .nav-slider { top: 3px; bottom: 3px; left: 4px; border-radius: 8px; }
}

const KNOWLEDGE_HTML = "<h2 class=\"chapter-title\" id=\"chap-2\">材料与热处理</h2>\n<h3 class=\"section-title\" id=\"sec-2-1\">材料的分类</h3>\n<p class=\"para\">材料：金属材料，非金属材料；</p>\n<p class=\"para\">金属材料：黑色金属，有色金属；</p>\n<h3 class=\"section-title\" id=\"sec-2-2\">材料性能</h3>\n<p class=\"para\">材料性能：使用性能（包括力学性能（强度、硬度、刚度。。。）、物理性能和化学性能等）和工艺性能（铸造性能、焊接性能、压力加工性能、切削性能和热处理性能）；</p>\n<h3 class=\"section-title\" id=\"sec-2-3\">常用金属材料及其牌号</h3>\n<p class=\"para\">掌握常用碳素钢（碳素结构钢Q235、优质碳素结构钢45、碳素工具钢T8、T12）、合金钢（在碳素钢的基础上加入合金元素，使得材料的性能提高或具有特殊的性能12Mn）和铸铁（HT200、KTH330－08）的分类、牌号、性能、应用。</p>\n<p class=\"para\">Q235A：Q屈服强度，235MPa，A质量等级，螺栓、连杆、法兰等</p>\n<p class=\"para\">45：数字表示钢中碳的平均质量分数的万分之几，0.45%，轴承、齿轮等</p>\n<p class=\"para\">T12：T表示碳素工具钢，数字表示钢中碳的平均质量分数的千分之几，1.2%，刀具、模具等</p>\n<p class=\"para\">12Mn：首两位数字表示碳的质量分数的万分之几，元素符号后数字表示该元素含量的百分之几，小于1.5%不标</p>\n<h3 class=\"section-title\" id=\"sec-2-4\">热处理</h3>\n<p class=\"para\">热处理是将工件加热到一定的温度，经保温后以一定的冷却速度冷却。通过热处理可使钢的组织和性能发生改变，可提高工件的力学性能，改善工艺性能，达到充分发挥金属材料的潜力，提高产品质量，延长使用性能，提高经济效益。</p>\n<p class=\"para\">钢的热处理基本工艺有：退火、正火、淬火和回火。</p>\n<h4 class=\"subsection-title\" id=\"sub-2-4-1\">退火</h4>\n<p class=\"para\">退火——加热到一定温度，经保温后随炉冷却。降低硬度、消除内应力、改善组织性能，包括完全退火、球化退火、去应力退火</p>\n<h4 class=\"subsection-title\" id=\"sub-2-4-2\">正火</h4>\n<p class=\"para\">正火——加热到一定温度，经保温后在空气中冷却。细化晶粒、消除内应力；低碳钢正火处理可提高强度和硬度、改善切削加工性能。</p>\n<h4 class=\"subsection-title\" id=\"sub-2-4-3\">淬火</h4>\n<p class=\"para\">淬火——加热到临界温度以上（30-50℃）的某一温度，经保温后以快速冷却（即大于临界冷却速度）。获得马氏体组织（硬、脆），45钢经淬火后硬度可达50-55HRC，碳素工具钢大于60HRC</p>\n<h4 class=\"subsection-title\" id=\"sub-2-4-4\">回火</h4>\n<p class=\"para\">回火——将淬火后的工件重新加热到临界点以下的某一温度，经长时期保温后缓慢冷却。</p>\n<p class=\"para\">一般随回火温度的升高，钢的强度和硬度下降，而塑性韧性上升。</p>\n<li class=\"arrow\">低温回火（150～250℃） 目的是消除和降低淬火钢的内应力及脆性，提高韧性，使零件具有较高的硬度（58～64HRC）。主要用于各种工、量、模具及滚动轴承等，如用T12钢制造的锯条、锉刀等，一般都采用淬火后低温回火。</li>\n<li class=\"arrow\">中温回火（350～500℃） 中温回火后工件的硬度有所降低，但可使钢获得较高的弹性极限和强度（35～45HRC）。主要用于各种弹簧的热处理。</li>\n<li class=\"arrow\">高温回火（500～650℃）通常将钢件淬火后加高温回火，称为调质处理。经调质处理后的零件，既具有一定的强度、硬度，又具有一定的塑性和韧性，即综合力学性能较好（25～35HRC）。主要用于轴、齿轮、连杆等重要结构零件。如各类轴、齿轮、连杆等采用中碳钢制造，经淬火+高温回火后，即可达到使用性能的要求。</li>\n<h2 class=\"chapter-title\" id=\"chap-3\">铸造</h2>\n<h3 class=\"section-title\" id=\"sec-3-1\">铸造概述</h3>\n<p class=\"para\">铸造是熔炼金属，制造铸型并将熔融金属浇入与零件形状相适应的铸型，凝固后获得一定形状和性能的铸件的成型方法。铸件一般是尺寸精度不高，表面粗糙的毛坯，必须经切削加工后才能成为零件。若对零件表面要求不高，也可直接使用。</p>\n<h3 class=\"section-title\" id=\"sec-3-2\">铸造的特点</h3>\n<li class=\"bullet\">铸造的适应性强，铸造可以制成形状和内腔十分复杂的铸件，特别是具有内腔的毛坯，如各种箱体、气缸体、气缸盖等。</li>\n<li class=\"bullet\">可用于各种材料，如有色金属，黑色金属、铸铁和铸钢等，但以黑色金属为主；可生产不同尺寸及质量的铸件，如壁厚可做到小于1mm、铸件的质量可以轻到几克、重达几百吨的铸件等。</li>\n<li class=\"bullet\">铸件生产成本低，设备投资较少，原材料价格低，来源广等。</li>\n<h3 class=\"section-title\" id=\"sec-3-3\">铸造的应用</h3>\n<li class=\"bullet\">主要应用在各种箱体和非承受载荷的低速齿轮等。如机床床身、齿轮箱、变速箱、手轮、内燃机气缸体、气缸盖、火车轮、皮带轮、台虎钳钳座等。</li>\n<li class=\"bullet\">铸造生产方法很多，主要分为两大类：①砂型铸造；②特种铸造。</li>\n<h3 class=\"section-title\" id=\"sec-3-4\">铸造主要工艺参数</h3>\n<li class=\"bullet\">收缩余量</li>\n<li class=\"bullet\">加工余量</li>\n<li class=\"bullet\">起模斜度--与壁高、造型方法、模样材料及表面粗糙度有关。</li>\n<li class=\"bullet\">铸孔、槽及型芯头</li>\n<li class=\"bullet\">铸造圆角</li>\n<p class=\"para\">铸造在机械制造中获得广泛的应用，但铸造生产工艺过程难以精确控制；铸件的化学成分和组织不十分均匀、晶粒粗大、组织疏松，常有气孔、夹渣、砂眼等缺陷存在，使得力学性能不如锻件高的缺点。随着新工艺、新材料发展，铸件的质量也在不断提高。</p>\n<h3 class=\"section-title\" id=\"sec-3-5\">造型工艺</h3>\n<li class=\"bullet\">造型时必须考虑到的工艺问题主要是分型面和浇注系统，它们直接影响铸件的质量及生产率等。</li>\n<li class=\"bullet\">分型面的确定 分型面是指上、下砂型的接触表面。</li>\n<p class=\"para\">分型面确定的原则：</p>\n<li class=\"bullet\">分型面应选择在模样的最大截面处；</li>\n<li class=\"bullet\">应使铸件上的重要加工面朝下或处于垂直位置；</li>\n<li class=\"bullet\">应使铸件全部或大部分在同一砂箱内，以减少错箱和提高精度。</li>\n<li class=\"bullet\">浇注系统的确定 浇注系统是指液体金属流入铸型的通道，并能平稳地将液体金属引入铸型，要有利于挡渣和排气，并能控制铸件的凝固顺序。</li>\n<li class=\"bullet\">如浇注系统开设得不好，铸件易产生浇不足、缩孔、冷隔、裂纹和夹杂物等缺陷。</li>\n<h3 class=\"section-title\" id=\"sec-3-6\">浇注系统</h3>\n<li class=\"bullet\">典型浇注系统一般包括：外浇口、直浇道、横浇道和内浇道等。</li>\n<li class=\"bullet\">外浇口—缓冲液体金属浇入时的冲击力和分离熔渣。</li>\n<li class=\"bullet\">直浇道—连接外浇口和横浇道的垂直通道，利用其高度使金属液产生一定的静压力而迅速地充满型腔。</li>\n<li class=\"bullet\">横浇道—连接直浇道和内浇道，位于内浇道之上，稳定金属液的流动，使其平稳经内浇道流入型腔及向各内浇道分配金属液，并起挡渣作用。</li>\n<li class=\"bullet\">内浇道—直接和型腔相连通道，可控制金属液流入型腔的位置、速度和方向。</li>\n<li class=\"bullet\">冒口：主要起补缩作用。同时还兼有排气、浮渣及观察金属液体的流动情况等。一般安放在壁厚顶部。</li>\n<h3 class=\"section-title\" id=\"sec-3-7\">熔炼设备</h3>\n<li class=\"bullet\">铸铁—冲天炉；</li>\n<li class=\"bullet\">铸钢—电弧炉；</li>\n<li class=\"bullet\">有色金属—坩埚炉。</li>\n<h3 class=\"section-title\" id=\"sec-3-8\">特种铸造</h3>\n<li class=\"bullet\">金属型铸造</li>\n<li class=\"bullet\">熔模铸造</li>\n<li class=\"bullet\">压力铸造</li>\n<li class=\"bullet\">离心铸造 是在离心力的作用下充型，所以组织致密，无缩孔、气孔、渣眼等缺陷，因此力学性能较好。铸造空心旋转体铸件不需要型芯和浇注系统，铸件不需要冒口补缩，省工省料、生产率高、质量好、成本低。</li>\n<h3 class=\"section-title\" id=\"sec-3-9\">造型操作技术</h3>\n<li class=\"bullet\">造型方法：手工造型和机器造型。</li>\n<li class=\"bullet\">手工造型方法：整模两箱造型、分模两箱造型、挖砂造型和假箱造型、活块造型、刮板造型、三箱造型等。</li>\n<h3 class=\"section-title\" id=\"sec-3-10\">造芯</h3>\n<li class=\"bullet\">型芯的主要作用是形成铸件的内腔。</li>\n<li class=\"bullet\">型（芯）砂——芯砂的性能要求比普通型砂的综合性能要高。</li>\n<h3 class=\"section-title\" id=\"sec-3-11\">浇注温度</h3>\n<p class=\"para\">浇注温度 浇注温度偏低，金属液流动性差，易产生浇不足、冷隔、气孔等缺陷；浇注温度过高，铸件收缩大，易产生缩孔、裂纹、晶粒粗大及粘砂等缺陷。合适的浇注温度应根据铸造合金种类、铸件的大小及形状等确定。</p>\n<h2 class=\"chapter-title\" id=\"chap-4\">压力加工</h2>\n<h3 class=\"section-title\" id=\"sec-4-1\">压力加工概述</h3>\n<p class=\"para\">压力加工是指对坯料施加外力，使其产生塑性变形，改变形状、尺寸和改善性能，以制造零件或毛坯的成形加工方法。</p>\n<li class=\"bullet\">锻造和冲压总称锻压。</li>\n<li class=\"bullet\">金属压力加工的主要方法有轧制、拉拔、挤压、自由锻、模锻和板料冲压等。</li>\n<h3 class=\"section-title\" id=\"sec-4-2\">锻压</h3>\n<p class=\"para\">金属材料经锻压后，其组织和性能都得到了改善，特别是铸造组织。通过压加工或锻造后，其内部的缺陷，如微裂纹、气孔、缩松等缺陷得到压合，使其结构致密，细化晶粒，力学性能大大提高。与铸件、焊件相比，锻压加工一般只能获得形状较简单的制件毛坯。</p>\n<h3 class=\"section-title\" id=\"sec-4-3\">锻造</h3>\n<li class=\"bullet\">凡是承受重载的机器零件，如主轴、曲轴、齿轮等。</li>\n<h3 class=\"section-title\" id=\"sec-4-4\">金属的加热</h3>\n<p class=\"para\">锻造时，金属坯料需加热。加热目的是为了提高金属的塑性，降低变形抗力，以使金属产生大量的变形，以便锻造。一般金属材料的可锻性常用塑性和变形抗力来衡量。随着含碳量的提高，金属材料的可锻性下降。一般工业纯铁、低碳钢的可锻性最好，而中碳钢、高碳钢、铸铁、硬质合金、有色金属等可锻性较差。</p>\n<p class=\"para\">金属材料加热后，随着温度的升高，其力学性能中的强度、硬度下降，而塑性、韧性提高。</p>\n<p class=\"para\">加热温度高，则金属的塑性好，变形抗力小，但加热温度不能过高，因为超过一定温度后，金属易出现氧化、脱碳、过热和过烧等缺陷，因此，加热最高温度以不出现过热为前提，即始锻温度。当温度降低到一定程度，金属塑性变差，不仅难以继续变形，且易产生裂纹，必须停止锻造，重新加热，即为终锻温度。45号钢的始锻温度为1150～1200℃，终锻温度为800℃。</p>\n<h3 class=\"section-title\" id=\"sec-4-5\">锻造工艺的分类</h3>\n<p class=\"para\">锻造工艺分为：自由锻、胎模锻和模锻等。</p>\n<h3 class=\"section-title\" id=\"sec-4-6\">自由锻基本工序</h3>\n<li class=\"bullet\">镦粗、拔长、冲孔、弯曲、扭转、错移、切割等。前3种应用得最多。</li>\n<li class=\"bullet\">自由锻有手工锻和机器锻两种。</li>\n<li class=\"bullet\">自由锻设备有空气锤、蒸气-空气锤和水压机等。</li>\n<h3 class=\"section-title\" id=\"sec-4-7\">板料冲压</h3>\n<p class=\"para\">板料冲压是在室温下，利用安装在压力机上的模具，对板料施加压力，使其产生变形或分离的工艺过程。也称为冷冲压。</p>\n<li class=\"bullet\">板料冲压可分为分离工序和变形工序两大类。</li>\n<li class=\"bullet\">分离工序：剪切、冲裁等；</li>\n<li class=\"bullet\">变形工序：弯曲、拉深、翻边等。</li>\n<h2 class=\"chapter-title\" id=\"chap-5\">焊接</h2>\n<h3 class=\"section-title\" id=\"sec-5-1\">焊接概述</h3>\n<p class=\"para\">焊接是通过加热或加压(或两者并用），并且用或不用填充材料，使焊件形成原子结合的一种连接方法。</p>\n<h3 class=\"section-title\" id=\"sec-5-2\">焊接的特点</h3>\n<li class=\"bullet\">焊接实现的连接是不可拆卸的永久性连接，采用焊接方法制造的金属构件，可以节省材料，简化制造工艺，缩短生产周期，且连接处具有良好的使用性能；</li>\n<li class=\"bullet\">如焊接工艺不当会产生缺陷、应力和变形等。</li>\n<h3 class=\"section-title\" id=\"sec-5-3\">焊接的应用</h3>\n<li class=\"bullet\">焊接广泛应用于制造各种金属结构件，如桥梁、船体、建筑、压力容器、锅炉、车辆、飞机等；</li>\n<li class=\"bullet\">也常用于机器零件毛坯，如机架、底座、箱体、吊车车架等；</li>\n<li class=\"bullet\">还可用于修补铸、锻件的缺陷和局部损坏的零件。</li>\n<h3 class=\"section-title\" id=\"sec-5-4\">焊接方法</h3>\n<li class=\"bullet\">熔化焊：电弧焊、气焊、电渣焊等。电弧焊有手工电弧焊、埋弧自动焊、气体保护焊等；</li>\n<li class=\"bullet\">压力焊：电阻焊、摩擦焊等。电阻焊有点焊、对焊、缝焊等；</li>\n<li class=\"bullet\">钎焊：硬钎焊和软钎焊。</li>\n<li class=\"bullet\">原则上各种金属都能焊接，但焊接性能相差很大，要选用相应的焊接方法和工艺措施。焊接性能随着含碳量的增加，可焊性下降。纯铁、低碳钢焊接性能最好，高碳钢、铸铁、铸钢、有色金属、异种材料的焊接性能差，一般不用来制作焊接结构件。</li>\n<h3 class=\"section-title\" id=\"sec-5-5\">手工电弧焊</h3>\n<p class=\"para\">手工电弧焊的焊条由焊芯和药皮两部分组成。</p>\n<li class=\"bullet\">焊芯作用：①作为电极传导焊接电流，产生电弧；②熔化后又作为焊缝的充填金属。</li>\n<li class=\"bullet\">药皮作用：①改善焊接工艺；②机械保护；③冶金处理。</li>\n<li class=\"bullet\">焊接不同的材料应选不同的焊条，并非选用焊条强度级别高的，就能提高焊缝质量。</li>\n<li class=\"bullet\">焊条直径的选择：根据被焊工件的厚度和焊接质量来选择。</li>\n<li class=\"bullet\">焊接电流的选择：根据焊条直径来选择。</li>\n<h3 class=\"section-title\" id=\"sec-5-6\">气焊与气割</h3>\n<h4 class=\"subsection-title\" id=\"sub-5-6-1\">气焊</h4>\n<p class=\"para\">气焊是利用可燃气体燃烧的高温火焰来熔化母材充填金属一种焊接方法。焊接时，一般焰芯顶端应距焊件2～3mm。</p>\n<p class=\"para\">气焊通常使用的气体是乙炔和氧气。调节乙炔和氧气的比例，可得到三种不同的火焰：</p>\n<li class=\"bullet\">中性焰 火焰呈中性，应用最广，如桥梁、机架等。常用于焊接低中碳钢、合金钢、铜和铝合金等；</li>\n<li class=\"bullet\">碳化焰 火焰呈还原性，有增碳作用。常用于焊接高碳钢、铸铁、硬质合金等；</li>\n<li class=\"bullet\">氧化焰 火焰呈氧化性，一般不采用，但可用于焊接黄铜。</li>\n<p class=\"para\">气焊操作：点火时，先微开氧气阀，再开乙炔阀；灭火时，先关乙炔阀，再关氧气阀；回火时，应先关乙炔阀，再关氧气阀。</p>\n<p class=\"para\">与电弧焊相比，气焊火焰温度比电弧焊低，热量分散，生产率低，焊接变形大，接头质量差，但气焊火焰可控制，操作方便，灵活性强，不需要电源，可在没有电源的地方应用。气焊适用于焊接厚度为3mm以下的低碳钢薄板、高碳钢、铸件、硬质合金、铜、铝等有色金属及合金。</p>\n<h4 class=\"subsection-title\" id=\"sub-5-6-2\">气割</h4>\n<p class=\"para\">气割是利用某些金属在纯氧中燃烧原理来实现金属切割的方法。对金属材料进行切割时，被切割金属应满足以下条件：</p>\n<li class=\"bullet\">（1）金属的燃点应低于熔点；</li>\n<li class=\"bullet\">（2）燃烧生成的金属氧化物的燃点应低于金属本身的燃点；</li>\n<li class=\"bullet\">（3）金属燃烧时产生大量的热，且金属本身导热性要低。</li>\n<p class=\"para\">满足上述条件的金属材料有低、中碳钢和低合金钢；而高碳钢、铸铁、高合金钢及铜、铝等有色金属及合金，均难以进行气割。</p>\n<h3 class=\"section-title\" id=\"sec-5-7\">电阻焊</h3>\n<p class=\"para\">电阻焊的特点：低电压、强电流、焊接时间短、不需填充金属、焊接变形小、生产率高、操作简单，易于实现机械化和自动化。</p>\n<p class=\"para\">电阻焊的基本形式有：</p>\n<li class=\"bullet\">（1）点焊—主要用于焊接厚度为4mm以下的薄板结构；</li>\n<li class=\"bullet\">（2）缝焊—连续点焊，厚度3mm以下，要求密封的容器和管道；</li>\n<li class=\"bullet\">（3）对焊—直径小于20mm，强度要求低的棒材、管材的对焊。</li>\n<h3 class=\"section-title\" id=\"sec-5-8\">钎焊</h3>\n<p class=\"para\">钎焊是采用比母材熔点低的金属材料作为钎料，将焊件接头和钎料同时加热到钎料熔化而焊件不熔化，使液态嵌料渗入接头间隙并向接头表面扩散，形成钎焊接头的方法。</p>\n<p class=\"para\">按钎料熔点不同，钎焊可分为：</p>\n<li class=\"bullet\">（1）硬钎焊 钎料熔点大于450℃，接头强度大于200MPa，主要用于接头受力较大，工作温度较高的焊件。</li>\n<li class=\"bullet\">（2）软钎焊 钎焊熔点小于450℃接头强度小于70MPa，主要用于受力不大，工作温度较低的焊件。</li>\n<p class=\"para\">钎焊与熔化焊相比，加热温度低，接头金属组织和性能变化及焊接变形小，尺寸容易保证。生产率高，易于实现机械化和自动化。可焊接异种金属，但接头强度较低，特别是冲击韧性较低。耐热能力较差。</p>\n<p class=\"para\">目前主要用于电子元件、精密仪表机械等。</p>\n<h3 class=\"section-title\" id=\"sec-5-9\">常见焊接缺陷</h3>\n<p class=\"para\">焊接缺陷是指焊接接头部位在焊接过程中形成的缺陷，焊接缺陷包括气孔、夹渣、未焊透、未熔合、裂纹、凹坑、咬边、焊瘤等</p>\n<p class=\"para\">裂纹 焊瘤 烧穿 弧坑 气孔 夹渣 咬边 未熔合 未焊透</p>\n<h2 class=\"chapter-title\" id=\"chap-6\">切削加工基础</h2>\n<h3 class=\"section-title\" id=\"sec-6-1\">金属切削加工</h3>\n<p class=\"para\">金属切削加工是通过刀具与工件的相对运动，从毛坯上切去多余的金属，以获得一定的形状、尺寸、加工精度和表面粗糙度都符合要求的零件加工方法。</p>\n<li class=\"bullet\">金属切削加工分为钳工和机械加工两大类。</li>\n<li class=\"bullet\">钳工—一般由工人手持工具对工件进行切削加工，包括划线、锯削、锉削、攻丝和套扣、刮研、钻孔、铰孔及装配等。</li>\n<li class=\"bullet\">机械加工—通过金属切削机床对工件进行切削加工，如车（数车）、铣（数铣）、磨、钻、刨及特种加工等。</li>\n<h3 class=\"section-title\" id=\"sec-6-2\">切削运动和切削用量</h3>\n<h4 class=\"subsection-title\" id=\"sub-6-2-1\">切削运动</h4>\n<li class=\"bullet\">1）主运动</li>\n<li class=\"bullet\">2）进给运动</li>\n<h4 class=\"subsection-title\" id=\"sub-6-2-2\">切削用量三要素</h4>\n<li class=\"bullet\">切削用量三要素：</li>\n<li class=\"bullet\">1）切削速度v</li>\n<li class=\"bullet\">2）进给量f</li>\n<li class=\"bullet\">3）背吃刀量αp</li>\n<p class=\"para\">三要素中对刀具耐用度影响最大的是v，其次是f，最小的是αp。</p>\n<p class=\"para\">在选定合理的刀具后，粗加工：αp→f→ v； 精加工： v→f→ αp。</p>\n<h3 class=\"section-title\" id=\"sec-6-3\">刀具的几何角度</h3>\n<p class=\"para\">金属切削刀具种类繁多，构造各异。较典型的车刀，其它刀具的切削部分都可看作以车刀为基本形态演变而成的。以车刀为例来分析切削部分的几何角度。</p>\n<h4 class=\"subsection-title\" id=\"sub-6-3-1\">车刀的组成</h4>\n<p class=\"para\">车刀的组成：车刀由刀头和刀体两部分组成。刀尖为切削部分，刀体用来将车刀夹持在刀架上，起支承与传力作用。</p>\n<p class=\"para\">刀头一般由三个面、二个刃和一个尖组成。</p>\n<li class=\"bullet\">1）前面</li>\n<li class=\"bullet\">2）主后面</li>\n<li class=\"bullet\">3）副后面</li>\n<li class=\"bullet\">4）主切削刃</li>\n<li class=\"bullet\">5）副切削刃</li>\n<li class=\"bullet\">6）刀尖</li>\n<h4 class=\"subsection-title\" id=\"sub-6-3-2\">车刀几何角度</h4>\n<p class=\"para\">1）前角γ0： 在正交平面上测量的前面与基面的夹角。增大前角，则刀具锋利，切削轻快，但前角过大，刀刃强度降低，硬质合金车刀的前角一般取-5°～+25°。当工件材料硬度较低、塑性较好、刀具韧性较好及精加工时，前角取大些，反之，前角取小些。</p>\n<p class=\"para\">2）后角α0：在正交平面上测量的主后面与切削平面的夹角。增大后角，可减少刀具主后面与工件摩擦，但后角过大，刀具强度降低。一般粗加工时取6°～8°；精加工时取10°～12°。即粗加工时取小值，精加工时取大值。</p>\n<p class=\"para\">3）主偏角Κr： 在基面中测量，主切削刃与进给运动方向在基面上投影的夹角。增大主偏角，可使轴向分力加大，径向分力减小，有利于减小振动，改善切削条件，但刀具磨损加快，散热条件变差。主偏角一般取45°～90°。工件刚度好，粗加工时取小值。</p>\n<p class=\"para\">4）副偏角Κr′：在基面中测量，是副切削刃与进给运动反方向在基面上投影的夹角。增大副偏角可减小副切削刃与已加工面的摩擦，降低表面粗糙度，防止切削时产生振动。一般副切削刃取5°～15°，粗加工时取大值，精加工时取小值。</p>\n<p class=\"para\">5）刃倾角λs：在切削平面中测量的主切削刃与基面的夹角。其主要作用是控制切屑的流动方向。切削刃与基面平行时，λs=0；刀尖处于切削刃的最低点，λs为负值，刀尖强度增大，切屑流向已加工表面，用于粗加工；刀尖处于切削刃的最高点，λs为正值，刀尖强度较低，切削流向待加工表面，用于精加工。刃倾角一般取-5°～+10°。粗加工时取负值，精加工时取正值。在切削加工中，一般粗加工时，应选择小的γ0 、α0；精加工时应选择大的γ0 、α0。</p>\n<h3 class=\"section-title\" id=\"sec-6-4\">刀具材料</h3>\n<p class=\"para\">刀具切削部分的材料应具有的性能：</p>\n<li class=\"bullet\">①高的硬度； ②高的耐磨性； ③高的热硬性；</li>\n<li class=\"bullet\">④足够的强度和韧性。</li>\n<h4 class=\"subsection-title\" id=\"sub-6-4-1\">常用刀具材料</h4>\n<li class=\"bullet\">1）碳素工具钢 如T10、T10A、T12、T12A等，用于制造手工工具，如锉刀、锯条等；</li>\n<li class=\"bullet\">2）合金工具钢 如9SiCr、CrWMn等，用于制造复杂的刀具，如板牙、丝锥、铰刀等；</li>\n<li class=\"bullet\">3）高速钢 如W18Cr4V等，用于制造复杂的刀具，如钻头、拉刀、铣刀等；</li>\n<li class=\"bullet\">4）硬质合金 可用于高速切削刀具。常用的有：</li>\n<p class=\"para\">①钨钴类：用于加工脆性材料，如铸铁等。常用牌号有YG3、YG6、YG8等。YG8用于粗加工；YG6、YG3用于半精和精加工。</p>\n<p class=\"para\">②钨钴钛类：加工塑性材料，如碳钢等。常用牌号YT5、YT15、YT30等。YT5用于粗加工；YT15、YT30用于半精和精加工。</p>\n<h3 class=\"section-title\" id=\"sec-6-5\">常用量具</h3>\n<li class=\"bullet\">①卡钳：内卡钳和外卡钳；</li>\n<li class=\"bullet\">②游标卡尺；</li>\n<li class=\"bullet\">③百分表；</li>\n<li class=\"bullet\">④百分尺。</li>\n<h2 class=\"chapter-title\" id=\"chap-7\">车削加工</h2>\n<h3 class=\"section-title\" id=\"sec-7-1\">车削概述</h3>\n<p class=\"para\">车削是机械加工中的主要方法，使用范围很广。车削是利用工件的旋转运动和刀具的直线运动来加工的，在车床上可加工内外圆柱面、内外圆锥面、内外螺纹、成形面、端面、沟槽、滚花等。</p>\n<h3 class=\"section-title\" id=\"sec-7-2\">普通车床</h3>\n<li class=\"bullet\">车床的组成：床身、主轴箱、进给箱、溜板箱、拖板、刀架和尾座等。</li>\n<h3 class=\"section-title\" id=\"sec-7-3\">工件的装夹方法</h3>\n<li class=\"bullet\">（1）三爪卡盘装夹工件</li>\n<li class=\"bullet\">（2）四爪卡盘装夹工件</li>\n<li class=\"bullet\">（3）顶尖装夹工件</li>\n<li class=\"bullet\">（4）花盘装夹工件</li>\n<li class=\"bullet\">（5）心轴装夹工件</li>\n<li class=\"bullet\">（6）中心架及跟刀架装夹工件</li>\n<p class=\"para\">车加工精度一般IT10～IT8，表面粗糙度Ra6.3～1.6μm。</p>\n<h3 class=\"section-title\" id=\"sec-7-4\">车刀的安装</h3>\n<li class=\"bullet\">（1）车刀刀尖应与工件中心线等高 当刀尖高于工件中心线时,则前角增大而后角减小,车刀后面与工件之间的摩擦增大；反之，前角减小，后角增大，切削不顺利。</li>\n<li class=\"bullet\">（2）车刀刀杆轴线应与工件表面垂直 否则，会引起主偏角和副偏角发生变化。</li>\n<li class=\"bullet\">（3）刀杆伸出长度不宜太长 以免发生刀杆振动，一般伸出长度不超过刀杆厚度的1.1～1.5倍。</li>\n<h3 class=\"section-title\" id=\"sec-7-5\">车端面</h3>\n<p class=\"para\">车端面时应注意：</p>\n<li class=\"bullet\">（1）车刀刀尖应对准工件中心，否则将在端面中心处车出凸台，并易蹦坏刀尖。</li>\n<li class=\"bullet\">（2）车端面时，切削速度由外向中心逐渐减少，会影响端面粗糙度，工件速度应比车外圆略高。45°右偏刀车端面由外向中心车削时，凸台是瞬间车掉，易产生振动，损坏刀具，因此，切削接近中心时，应放慢进给速度。有孔工件车端面时，常用右偏刀由中心向外进给，切削厚度较小，刀刃有前角，因而切削顺利，粗糙度小。</li>\n<li class=\"bullet\">（3）车削直径较大的端面时，为避免因车刀受刀架移动产生凸出或凹进，可将拖板固定在床身上横向切削，背吃刀量用小刀架调节。</li>\n<h3 class=\"section-title\" id=\"sec-7-6\">车圆锥</h3>\n<h4 class=\"subsection-title\" id=\"sub-7-6-1\">转动小拖板法</h4>\n<p class=\"para\">当内外圆锥面的圆锥角为α时，将小刀架扳转α/2，然后固定，摇动小拖板手柄，即可车出所需的圆锥面。这种方法操作简单，可加工任意锥角的内、外圆锥面，但加工长度受到限制，只能手动进给，粗糙度为12.5～3.2μm。</p>\n<h4 class=\"subsection-title\" id=\"sub-7-6-2\">偏移尾架法</h4>\n<p class=\"para\">把工件装在前、后顶尖上，然后，将尾座顶尖横向偏移一个S距离，使工件中心轴线与车床主轴中心线的交角等于工件锥角的1/2，利用车刀作纵向进给，即可车出圆锥。这种方法可加工较长的锥面，并可手动或自动进给，但不能车削内圆锥面。尾架的偏移量受到限制，只能适用于车削锥度不大的锥面（α＜8°），粗糙度为6.3～1.6 μm。</p>\n<h4 class=\"subsection-title\" id=\"sub-7-6-3\">靠尺法</h4>\n<p class=\"para\">靠尺法</p>\n<h4 class=\"subsection-title\" id=\"sub-7-6-4\">宽刀法</h4>\n<p class=\"para\">宽刀法</p>\n<h3 class=\"section-title\" id=\"sec-7-7\">车螺纹</h3>\n<h4 class=\"subsection-title\" id=\"sub-7-7-1\">保证正确的牙形角</h4>\n<li class=\"bullet\">1）车刀的刀尖角应等于牙形角α 使车刀切削部分形状与螺纹截面形状相吻合。为保证这一要求，应取前角γ0 =0。粗加工时，为了改善切削条件，可用带有正前角的车刀车削。</li>\n<li class=\"bullet\">2）正确地安装车刀 车刀刀尖必须与工件中心等高，否则螺纹的截面将有改变。此外，车刀刀尖角的等分线必须与工件的轴线相垂直。为了保证这一要求，应用对刀样板进行对刀。</li>\n<h4 class=\"subsection-title\" id=\"sub-7-7-2\">保证工件的螺距</h4>\n<p class=\"para\">保证螺距的基本方法是：在工件旋转一周时，车刀准确移动一个螺距。调整车床和交换齿轮根据公式计算出的交换齿轮必须符合下列条件：</p>\n<p class=\"para\">Z1+Z2≥Z3+（15～20）</p>\n<p class=\"para\">Z3+Z4≥Z2+（15～20）</p>\n<h2 class=\"chapter-title\" id=\"chap-8\">钻削与镗削</h2>\n<h3 class=\"section-title\" id=\"sec-8-1\">钻削</h3>\n<p class=\"para\">钻削加工是钻头作旋转的主运动，同时钻头本身又作轴向的进给运动。在实体材料上加工孔的方法。</p>\n<li class=\"bullet\">钻床是孔加工机床。可以完成钻孔、扩孔、锪孔和铰孔等工作。</li>\n<li class=\"bullet\">钻孔是孔加工的一种基本方法。</li>\n<li class=\"bullet\">钻孔所用的刀具有麻花钻、中心钻和深孔钻等。</li>\n<li class=\"bullet\">麻花钻：有两条对称的主切削刃，如刃磨时两条主切削刃不相等，则所钻孔直径要大于钻头直径。</li>\n<li class=\"bullet\">钻孔：钻孔过程最容易发生引偏使孔径增大，所以，钻孔前在孔中心要打样冲眼，孔中心要打得大一些，则可起到钻孔时不易偏离中心。</li>\n<li class=\"bullet\">钻孔属粗加工，精度一般IT13～IT11，表面粗糙度12.5～6.3μm。</li>\n<h3 class=\"section-title\" id=\"sec-8-2\">扩孔与铰孔</h3>\n<p class=\"para\">扩孔：用扩孔钻将已有孔（如铸出、锻出或钻出的孔）扩大加工的方法。扩孔属半精加工，精度一般为IT9～IT10，表面粗糙度为3.2～6.3μm。</p>\n<li class=\"bullet\">扩孔可以作为孔加工的最后工序或作为铰孔前的准备工序。</li>\n<p class=\"para\">铰孔：当孔的精度和表面粗糙度要求较高时，则要采用铰孔。铰孔是对工件上已有孔进行精加工的方法之一。</p>\n<li class=\"bullet\">铰孔可分为粗铰和精铰。粗铰时精度为IT8～IT7，表面粗糙度为1.6～0.8μm;精铰时精度为IT7～IT6,表面粗糙度为0.8～0.4μm。</li>\n<p class=\"para\">钻、扩、铰只能保证孔本身的精度，而不能保证孔与孔之间的尺寸精度。此时，可利用夹具（如钻模）或镗孔来保证。</p>\n<h3 class=\"section-title\" id=\"sec-8-3\">镗孔</h3>\n<p class=\"para\">镗孔是对工件上已有孔进行精加工方法之一。镗孔一般精度为IT8～IT7，表面粗糙度为0.8～1.6μm；</p>\n<p class=\"para\">精镗时，可达精度IT7～IT6，表面粗糙度为0.2～0.8 μm。</p>\n<p class=\"para\">镗孔主要用于箱体、机架等结构复杂的中、大型零件上孔与孔之间的加工，容易保证孔与孔之间、孔与基准面之间的尺寸精度及位置精度。</p>\n<h2 class=\"chapter-title\" id=\"chap-9\">铣削与刨削</h2>\n<h3 class=\"section-title\" id=\"sec-9-1\">铣削</h3>\n<li class=\"bullet\">最常用的铣床是万能立式铣床和万能卧式铣床。</li>\n<li class=\"bullet\">可铣削平面、成形面、台阶、键槽、T形槽、齿轮、镗孔等。</li>\n<h3 class=\"section-title\" id=\"sec-9-2\">铣刀的种类</h3>\n<li class=\"bullet\">常用铣刀有圆柱铣刀、端铣刀、直柄铣刀、圆锥铣刀、三面刃铣刀、盘铣刀等。</li>\n<li class=\"bullet\">端铣刀可铣削平面、斜面和垂直面等。</li>\n<h3 class=\"section-title\" id=\"sec-9-3\">铣床主要附件</h3>\n<li class=\"bullet\">①平口钳 对于中小型工件，多用平口钳装夹；对于大中型工件，则用压板、角铁和V型块紧压在工作台上。</li>\n<li class=\"bullet\">②回转工作台 主要用于对较大工件进行分度，或加工具有圆弧表面和圆弧形腰槽的零件；</li>\n<li class=\"bullet\">③万能分度头 N=40/Z用于各种齿槽及多面体工件的铣削加工。</li>\n<h3 class=\"section-title\" id=\"sec-9-4\">铣削的特点</h3>\n<p class=\"para\">铣削与刨削相比，除狭长平面外，生产率高，其主要原因是由于铣刀是由多齿和多刃组成，铣削工作同时由参加工作的几个刀齿和刀刃承担，切削用量大，刀齿与工件接触时间短，刀具冷却条件好，铣刀的耐用度高，所以铣削具有较高的生产率及加工精度。</p>\n<h2 class=\"chapter-title\" id=\"chap-10\">磨削加工</h2>\n<h3 class=\"section-title\" id=\"sec-10-1\">磨削加工概述</h3>\n<p class=\"para\">在磨床上用砂轮切削工件表面的方式称为磨削加工。磨削加工通常用于零件的精加工，一般加工精度为IT5～IT7，表面粗糙度为0.2～0.8μm。磨削不仅可加工钢、铸铁等一般材料，还可以加工一般刀具难以加工的材料（如淬火钢、硬质合金等）。</p>\n<h3 class=\"section-title\" id=\"sec-10-2\">磨削特点</h3>\n<li class=\"bullet\">能加工硬度很高的材料 如淬硬钢、硬质合金等。这是因为砂轮磨粒本身具有很高的硬度和耐热性。</li>\n<li class=\"bullet\">能获得高精度和低粗糙度的加工表面 这是砂轮和磨床特性决定的。磨粒圆角半径小，分布稠密且多为负前角；磨削速度高，每个磨刃切削量小；磨床刚度好，转动平稳，可作微量进给。它们保证了能作均匀的微量切削。因此磨削能获得高的加工精度。</li>\n<li class=\"bullet\">磨削温度高 由于剧烈的摩擦，产生了大量的磨削热，使磨削区温度很高。这会使工件表面产生磨削应力和变形，甚至造成工件表面烧伤。因此，磨削时必须注入大量的冷却液，以降低磨削温度。冷却液还可起到排屑和润滑作用。</li>\n<h3 class=\"section-title\" id=\"sec-10-3\">磨削过程</h3>\n<p class=\"para\">磨削过程是切削、刻划和滑擦三种过程的综合。</p>\n<h3 class=\"section-title\" id=\"sec-10-4\">磨削运动</h3>\n<li class=\"bullet\">主运动—指砂轮的旋转运动；</li>\n<li class=\"bullet\">进给运动：工件的旋转运动、砂轮的纵向移动、砂轮的径向进给运动</li>\n<h3 class=\"section-title\" id=\"sec-10-5\">磨削径向力与光磨</h3>\n<p class=\"para\">磨削时径向力很大 这会造成机床—砂轮—工件系统的弹性退让，使实际切深小于名义切深。因此，磨削将要完成时，应不进刀进行光磨，以消除误差。</p>\n<h3 class=\"section-title\" id=\"sec-10-6\">砂轮的自锐性与硬度</h3>\n<h4 class=\"subsection-title\" id=\"sub-10-6-1\">自锐性</h4>\n<p class=\"para\">砂轮具有\"自锐性\" 磨粒磨钝后，其磨削力也随之增大，致使磨粒破碎或脱落，重新露出锋利的刃口。这种特性称为\"自锐性\"。自锐性能使磨削在一定时间内正常进行，超过一定时间后，应进行人工修磨，以免磨削力增大引起振动及损失表面质量。</p>\n<h4 class=\"subsection-title\" id=\"sub-10-6-2\">砂轮的硬度</h4>\n<p class=\"para\">砂轮的硬度是指在外力作用下磨粒脱落的难易程度。易脱落的称之为软，反之为硬。磨削软材料时选用硬砂轮，磨削硬材料时则选用软砂轮。粗磨选用软砂轮，精磨选用硬砂轮。</p>\n<h2 class=\"chapter-title\" id=\"chap-11\">钳工</h2>\n<h3 class=\"section-title\" id=\"sec-11-1\">钳工概述</h3>\n<p class=\"para\">钳工是手持工具对工件进行加工的方法。</p>\n<li class=\"bullet\">基本操作：划线、錾削、锯削、锉削、攻丝和套扣、刮削及装配等。</li>\n<h3 class=\"section-title\" id=\"sec-11-2\">划线</h3>\n<p class=\"para\">1）划线种类</p>\n<li class=\"bullet\">①平面划线—在工件的一个平面上划线；</li>\n<li class=\"bullet\">②立体划线—在工件三个坐标方向上划线。</li>\n<p class=\"para\">2）划线基准</p>\n<p class=\"para\">零件上用来确定点、线、面位置的依据，作为划线依据的基准，称为划线基准。</p>\n<h3 class=\"section-title\" id=\"sec-11-3\">锯削</h3>\n<p class=\"para\">锯条用碳素工具钢制成，并经淬火及回火处理，硬度可达58～62HRC。</p>\n<p class=\"para\">锯条规格用其两端安装孔的距离来表示。常用锯条长300mm、宽12mm、厚0.8mm。</p>\n<p class=\"para\">锯条按齿距分为粗齿、中齿和细齿3种。</p>\n<h4 class=\"subsection-title\" id=\"sub-11-3-1\">锯条的安装</h4>\n<p class=\"para\">锯条装在锯弓上，锯齿向前，松紧适当，不能有歪斜和扭曲，否则，锯削时易折断。</p>\n<h4 class=\"subsection-title\" id=\"sub-11-3-2\">锯条的选用</h4>\n<p class=\"para\">锯削软材料（如铜、铝等有色金属）及厚工件时，选用粗齿锯条；锯削普通钢、铸铁及中等厚度的工件时，选用中齿锯条；锯削较硬的材料（如中碳钢、合金钢等）或较薄的工件（如板料、钢管等）时，选用细齿锯条。</p>\n<h4 class=\"subsection-title\" id=\"sub-11-3-3\">锯削方法</h4>\n<p class=\"para\">锯削时应注意起锯、锯削压力和往返长度。</p>\n<p class=\"para\">锯削时，锯条与工件表面的起锯角应小于15°，并用左手拇指靠住锯条，锯弓作往复运动，左手施力，右手推进，用力要均匀；返回时，锯条轻轻地滑过加工面，速度不宜太快。锯削开始和终了时的压力和速度均应减少。</p>\n<p class=\"para\">锯条长度应充分利用，即往返长度不应少于2/3，以免局部过早磨损。锯缝如有歪斜，不可强扭，应将工件翻转90°，重新起锯。</p>\n<h3 class=\"section-title\" id=\"sec-11-4\">锉削</h3>\n<p class=\"para\">用锉刀从工件表面锉掉多余金属的加工方法称为锉削。锉削可提高工件的尺寸精度和降低表面粗糙度。锉削是钳工最基本的操作方法。可锉削平面、曲面、沟槽、内外圆弧面和复杂形状表面等。）</p>\n<h4 class=\"subsection-title\" id=\"sub-11-4-1\">锉刀的种类</h4>\n<p class=\"para\">锉刀用碳素工具钢制造，并经淬火及回火处理，硬度可达58～62HRC以上。</p>\n<p class=\"para\">锉刀规格以其工作部分的长度来标示，有100mm、50mm、·····、400mm等7种。</p>\n<p class=\"para\">锉刀面的齿纹有单齿纹和双齿纹之分。按用途分为普通锉刀、整形锉刀（又称什锦锉）和特种锉刀。按齿纹分为粗齿（每10mm有4～12齿）、中齿（每10mm有13～24齿）、细齿（每10mm有30～40齿）和油光锉（每10mm有40齿以上）。</p>\n<h4 class=\"subsection-title\" id=\"sub-11-4-2\">锉刀的选用</h4>\n<p class=\"para\">根据工件材料、加工余量、精度、表面粗糙度等来选用锉刀。粗齿锉刀用于粗加工及锉削较软的材料（如铜、铝等）；中齿锉刀用于粗锉后的加工；细齿锉刀用于锉光表面及锉削较硬的材料（如钢、铸铁等）；油光锉刀主要用于精锉后的表面修光。</p>\n<h4 class=\"subsection-title\" id=\"sub-11-4-3\">锉削方法</h4>\n<li class=\"bullet\">1）工件装夹在台虎钳口中间，被锉削表面距钳口的距离不要太高。</li>\n<li class=\"bullet\">2）以保持锉刀水平为原则，根据锉刀的规格不同握法不同。在锉削时，两手在锉刀上施加的力的大小是变化的，其原则是保持水平，即以工件为支点形成力的杠杆平衡。</li>\n<li class=\"bullet\">3）锉平面时，有顺向锉、交叉锉和推锉等。交叉锉用于粗加工，生长率高；顺向锉用于精加工锉平和锉光；推锉主要用于修光，适用于锉削细长工件及台阶面。</li>\n<li class=\"bullet\">4）锉圆弧时，有滚锉和顺锉等。滚锉是锉刀顺圆弧切向摆动锉削，常用于精锉外圆弧面；顺锉是锉刀垂直圆弧面轴向运动，适用粗锉。</li>\n<h3 class=\"section-title\" id=\"sec-11-5\">攻丝与套丝</h3>\n<p class=\"para\">攻丝是用丝锥在零件的通孔或盲孔上加工内螺纹；套丝是用板牙在圆杆或圆管上加工外螺纹。</p>\n<h4 class=\"subsection-title\" id=\"sub-11-5-1\">攻丝</h4>\n<p class=\"para\">攻丝前需要钻孔，一般钻孔的孔径应略大于螺纹内径。钻孔直径d可用经验公式计算或查表确定。</p>\n<p class=\"para\">塑性材料（钢、紫铜等） d=D-P</p>\n<p class=\"para\">脆性材料（铸铁、青铜等） d=D-（1.05-1.1)P</p>\n<p class=\"para\">式中：D—大螺纹直径；P—螺距。</p>\n<p class=\"para\">攻盲孔（不通孔）螺纹时 孔的深度=要求螺纹的长度+0.7D。</p>\n<p class=\"para\">将钻好的孔倒角，把头锥装在铰杠上，两手加压（大小合适）进行攻丝。注意要保持丝锥垂直，旋转一周后，要倒转。钻通孔螺纹时，注意丝锥切削部分要完全伸出孔端，然后用二锥、三锥完善螺孔。</p>\n<h4 class=\"subsection-title\" id=\"sub-11-5-2\">套丝</h4>\n<p class=\"para\">套丝前应检查圆杆直径,圆杆直径太大,板牙难以套入;太小则套出的螺纹牙形不完整。一般圆杆的直径要略小于螺纹外径。圆杆直径D也可经验公式计算或查表来确定。</p>\n<p class=\"para\">D=d-0.13P</p>\n<p class=\"para\">式中：d—外螺纹外径； P—螺距。</p>\n<p class=\"para\">一般材料韧性愈大，则圆杆直径愈小。</p>\n<p class=\"para\">套丝前，圆杆的端面要倒角，倒角深度要超过螺纹全深。</p>\n<p class=\"para\">套丝的操作与攻丝很相似，两手施力应均匀，保持板牙架手柄与圆杆垂直。</p>\n<h2 class=\"chapter-title\" id=\"chap-12\">数控与自动化</h2>\n<h3 class=\"section-title\" id=\"sec-12-1\">数控机床</h3>\n<p class=\"para\">数控机床综合应用了自动控制、计算机、精密测量和传动元件、结构设计等技术，是一种高效、柔性加工的机电一体化设备。）</p>\n<h3 class=\"section-title\" id=\"sec-12-2\">数控机床的组成</h3>\n<li class=\"bullet\">主机 是数控机床的主体，包括床身、立柱、主轴、进给机构等。</li>\n<li class=\"bullet\">CNC装置 是数控机床的核心，包括硬件（电路板、显示器、键盘、纸带阅读机等）以及相应的软件。</li>\n<li class=\"bullet\">驱动装置 是数控机床执行机构的驱动部件，包括主轴驱动单元、进给驱动单元、主轴电机相应的软件。数控机床的辅助装置和编程机及其他一些附属设备。</li>\n<h3 class=\"section-title\" id=\"sec-12-3\">数控机床分类</h3>\n<li class=\"bullet\">数控机床分类：点位控制机床、直线控制机床、轮廓控制机床。</li>\n<li class=\"bullet\">数控加工分为：数字控制（NC）、计算机数字控制（CNC）和直接数字控制等3类。</li>\n<h3 class=\"section-title\" id=\"sec-12-4\">数控编程</h3>\n<h4 class=\"subsection-title\" id=\"sub-12-4-1\">数控编程步骤</h4>\n<li class=\"bullet\">1）分析零件图形和工艺处理；</li>\n<li class=\"bullet\">2）数字处理；</li>\n<li class=\"bullet\">3）编写零件加工程序单、输入数控系统及程序检验。</li>\n<h4 class=\"subsection-title\" id=\"sub-12-4-2\">数控编程的方法</h4>\n<li class=\"bullet\">手工编程 适用于点加工或几何形状不太复杂的零件；</li>\n<p class=\"para\">自动编程 是用计算机把人们易懂的零件程序改成数控机床执行的数字加工程序，即数控编程的大部分工作由计算机来完成。编程人员只需根据易懂的零件图纸及工艺要求，使用规定的数控编程语言编写一个较简单的零件程序，并将其输入计算机进行自动处理，计算刀具中心轨迹，输出零件数控加工程序。</p>\n<h3 class=\"section-title\" id=\"sec-12-5\">数控指令</h3>\n<p class=\"para\">数控系统指令代码中，最基本的是G、S、M、T指令代码。</p>\n<li class=\"bullet\">G指令代码 准备功能，用来描述数控装置作某一操作的准备功能，如直线插补、圆弧插补等。它由代码\"G\"和两位数字组成，从G00～G99共100种。</li>\n<li class=\"bullet\">S 指令代码 主轴转速功能，由\"S\"和其后若干位数字组成。</li>\n<li class=\"bullet\">M指令代码 辅助操作功能，主要有两类，一类是主轴的正、反转，开、停，冷却液的开、关等；另一类是程序控制指令，进行子程序调用、结束等。</li>\n<li class=\"bullet\">T功能代码 刀具功能，用选择刀具和进行刀具补偿。选择刀具是在自动工作方式下对刀架上固定的刀具进行选择、换刀并固定；刀具补偿是对刀具磨损或对刀时的位置互差进行补偿。它由代码\"T\"和若干位数字组成。</li>\n<h3 class=\"section-title\" id=\"sec-12-6\">i5数控系统</h3>\n<li class=\"bullet\">i5机床操作与编程方式 请参考资源共享课--数车--教学案例中的资源。</li>\n<p class=\"para\">i5数控车削系统 由沈阳机床自主研发的具有自主知识产权的智能化数控系统基于PC的数控技术，数控系统是一台高品质的工控机，具有高速运算能力和扩展性，高达16G存储空间，支持USB和网络通讯，全键盘，12″彩色触摸屏。</p>\n<li class=\"arrow\">采用EtherCAT实时数字总线技术，配备自主研发的HSHA系列全数字伺服驱动器，具有高速、高精和高响应的特点。</li>\n<h3 class=\"section-title\" id=\"sec-12-7\">自动生产线与柔性制造</h3>\n<h4 class=\"subsection-title\" id=\"sub-12-7-1\">自动生产线</h4>\n<p class=\"para\">组成：自动化加工设备、工件输送装置、切屑输送装置、控制系统、刀具等。</p>\n<p class=\"para\">分类：刚性自动生产线、柔性自动生产线</p>\n<h4 class=\"subsection-title\" id=\"sub-12-7-2\">柔性制造技术</h4>\n<p class=\"para\">柔性制造系统基本结构：自动化加工设备、工件储运系统、刀具储运系统、多层计算机控制系统等基本组成部分</p>\n<p class=\"para\">扩展部分：自动清洗工作站、自动去毛刺设备、自动测量设备、集中切屑运输系统、集中冷却润滑系统等。</p>\n<h4 class=\"subsection-title\" id=\"sub-12-7-3\">集成制造系统（CIMS）</h4>\n<h3 class=\"section-title\" id=\"sec-12-8\">工业机器人</h3>\n<h2 class=\"chapter-title\" id=\"chap-13\">特种加工</h2>\n<h3 class=\"section-title\" id=\"sec-13-1\">特种加工需求</h3>\n<li class=\"bullet\">1）解决各种难加工材料的问题；</li>\n<li class=\"bullet\">2）解决各种特殊复杂表面的加工问题；</li>\n<li class=\"bullet\">3）解决各种具有特殊要求的零件的加工问题。</li>\n<h3 class=\"section-title\" id=\"sec-13-2\">特种加工特点</h3>\n<p class=\"para\">不是主要依靠机械能通过刀具等来切除金属或非金属材料，而是主要用其他能量形式，如电能、化学能、光能、声能、热能或与机械能组合等形式直接加工零件，以获得所需的几何形形状、尺寸精度和表面粗糙度的加工方法。</p>\n<p class=\"para\">加工用的工具材料可以低于被加工材料的硬度；</p>\n<p class=\"para\">加工过程中工具和工件之间不存在显著的机械切削力。</p>\n<h3 class=\"section-title\" id=\"sec-13-3\">特种加工种类</h3>\n<p class=\"para\">按其能量来源和工作原理的不同，在生产中应用较多的可分为电火花加工、电解加工、激光加工、超声波加工和一些新兴的特种加工。</p>\n<h3 class=\"section-title\" id=\"sec-13-4\">电火花加工</h3>\n<p class=\"para\">电火花加工是利用工具电极和工件两极之间脉冲放电时产生的电腐蚀现象对工件进行尺寸加工的加工方法。</p>\n<p class=\"para\">电火花加工的主要特点是脉冲放电的能量密度很高，可以加工用常规机械加工方法难以加工或无法加工的材料和形状。加工时，工具电极与工件不直接接触，两者之间的宏观作用力小，不受工具和工件刚度限制，有利于实现微细加工，而且工具电极材料不需比被加工的工件材料硬，因此工具电极制造容易。</p>\n<h3 class=\"section-title\" id=\"sec-13-5\">特种加工的能源形式</h3>\n<p class=\"para\">特种加工一般按照利用的能量形式分类如下：</p>\n<li class=\"bullet\">电、热能：电火花加工、电子束加工、等离子弧加工；</li>\n<li class=\"bullet\">电、机械能：离子束加工；</li>\n<li class=\"bullet\">电、化学能：电解加工；电解抛光；</li>\n<li class=\"bullet\">电、化学、机械能：电解磨削、电解珩磨、阳极机械磨削；</li>\n<li class=\"bullet\">光、热能：激光加工；</li>\n<li class=\"bullet\">化学能：化学加工、化学抛光；</li>\n<li class=\"bullet\">声、机械能：超声波加工；</li>\n<li class=\"bullet\">机械能：磨料喷射加工、磨料流加工、液体喷射加工。</li>\n<h3 class=\"section-title\" id=\"sec-13-6\">电火花线切割加工</h3>\n<h4 class=\"subsection-title\" id=\"sub-13-6-1\">电火花线切割加工机床</h4>\n<p class=\"para\">电火花线切割加工机床由机床主体、工作液系统、高频电源和控制装置等组成。</p>\n<p class=\"para\">机床主体 机床主要由床身、丝架、走丝机构和X-Y数控工作台等四部分组成。钼丝绕在贮丝筒上，并经过丝架上的导轮来回高速走动，贮丝筒由电机直接驱动，通过限拉开关控制正、反向。工件固定在X-Y数控工作台上。X-Y数控工作台分别有亮台步进电机驱动，控制装置控制步进电各自按预定的控制程序，根据火花间隙状态作伺服进给移动，切割出所需的工件。</p>\n<p class=\"para\">工作液系统 工作液由泵压送到加工区外围，由钼丝带入加工区。工作液经过滤后循环使用。</p>\n<p class=\"para\">高频电源 高频电源产生高频矩形脉冲，其阳极加至工件，阴极加至电极丝（钼丝）。脉冲信号的幅度值、脉冲和脉冲宽度等可以调节，以适应不同工况的需要。</p>\n<p class=\"para\">控制装置 控制装置是以专用的计算机为核心的控制系统。系统按照输入的程序指令控制机床加工，其间需进行大量的插补运算、判别。变频进给系统则将加工中检测到的放电间隙平均电压反馈给控制系统，控制系统根据此反馈信号调节加工（工作台）速度。</p>\n<p class=\"para\">加工程序输入方法有多种，常用的有键盘输入、纸带输入和自动编程系统编程后自动转化成加工程序直接输入。</p>\n<h4 class=\"subsection-title\" id=\"sub-13-6-2\">电火花线切割加工原理及特点</h4>\n<p class=\"para\">电火花线切割加工是用连续移动的钼丝、钨丝或铜丝作为线电极代替电火花成型加工中的成型电极而形成的加工方法。加工时金属丝为阴极，工件为阳极，两极通过直流高频脉冲电流，机床工作台带动工件在两个坐标方向作进给运动。</p>\n<p class=\"para\">电火花线切割加工不需要专门的工具电极，并且作为工具电极的金属丝在加工中不断移动，基本上无损耗；加工方便，生产周期短，成本低；加工精度高；生长率高，机床加工所需的功率小。</p>\n<h2 class=\"chapter-title\" id=\"chap-14\">3D打印技术</h2>\n<h3 class=\"section-title\" id=\"sec-14-1\">逆向工程基本概念和过程</h3>\n<h3 class=\"section-title\" id=\"sec-14-2\">STL文件格式</h3>\n<li class=\"arrow\">STL是计算机图形系统中表达三角形网格的一种文件格式。 每个小三角形用 3 个顶点坐标和一个法向量来描述，三角形的大小可以根据精度要求进行选择。</li>\n<li class=\"arrow\">常见3D打印格式有：STL、STP、IGS、OBJ、3DM、3DS等，其中STL格式简单，但只能描述三维物体几何信息中封闭的面或者体，不支持颜色材质等信息。</li>\n<li class=\"arrow\">作为CAD/CAM系统接口文件格式的工业标准之一，在计算机图形学处理CG,数字几何处理如CAD，和数字几何工业应用如3D打印机支持中最为常见，即所有成型机都可以接收STL文件格式进行打印。</li>\n<li class=\"arrow\">STL 文件有二进制码和 ASCll 码两种，二进制码输出形式所占空间比 ASCII 码输出形式的文件所占用的空间小得多，但ASCII码输出形式可以阅读和检查。</li>\n<li class=\"arrow\">典型的CAD 软件都带有转换和输出 STL 格式文件的功能。</li>\n<h3 class=\"section-title\" id=\"sec-14-3\">FDM快速成形方法</h3>\n<p class=\"para\">FDM——Fused Deposition Modeling，熔融沉积成型</p>\n<h3 class=\"section-title\" id=\"sec-14-4\">其它快速成形方法</h3>\n<li class=\"bullet\">SLA——Stereo Lithography Apparatus，光敏树脂选择性固化成形</li>\n<li class=\"bullet\">3DP——Three Dimensional Printing，喷墨粘粉式技术或粘合剂喷射成形</li>\n<li class=\"bullet\">SLS——Selective Laser Sintering，粉末材料选择性激光烧结成形</li>\n<li class=\"bullet\">LOM——Laminated Object Manufacturing，箔材叠层实体成形</li>\n<h2 class=\"chapter-title\" id=\"chap-15\">CAD/CAM</h2>\n<h3 class=\"section-title\" id=\"sec-15-1\">CAD/CAM技术</h3>\n<p class=\"para\">利用计算机作为主要技术手段，对产品从构思到投放市场的整个过程中的信息进行分析和处理，生成和运用各种数字信息和图形信息，进行产品的设计与制造。</p>\n<p class=\"para\">CAD/CAM技术不是传统设计、制造流程的方法的简单映像，也不是局限于在个别步骤或环节中部分的使用计算机作为工具，而是将计算机科学与工程领域的专业技术以及人的智慧和经验以现代的科学方法为指导结合起来，在设计、制造的全过程中各尽所长，尽可能的利用计算机系统来完成那些重复性高、劳动量大、计算复杂以及单纯靠人工难以完成的工作，辅助而非代替工程技术人员完成整个过程，以获得最佳效果。</p>\n<p class=\"para\">CAD/CAM系统以及算计硬件、软件为支持环境，通过各个功能模块（分系统）实现对产品的描述、计算、分析、优化、绘图、工艺规程设计、仿真以及NC加工。</p>\n<p class=\"para\">广义的CAD/CAM集成系统还应包括生产规划、管理、质量控制等方面。</p>\n<p class=\"para\">CAD/CAM技术可以应用在许多领域，机械制造是最早也是最广泛应用CAD/CAM技术的领域。随着CAD/CAM技术的发展，建筑、电子、化工的领域也开始应用该技术。</p>\n<h3 class=\"section-title\" id=\"sec-15-2\">常用CAD/CAM软件</h3>\n<li class=\"bullet\">Cimatron</li>\n<li class=\"bullet\">Pro/Engineer</li>\n<li class=\"bullet\">Unigraphics(UG)</li>\n<li class=\"bullet\">SOLIDEDGE</li>\n<li class=\"bullet\">AutoCAD</li>\n<li class=\"bullet\">SolidWorks</li>\n<li class=\"bullet\">I-DEAS</li>\n<li class=\"bullet\">CAXA</li>\n<p class=\"para\">CAD软件造型的典型方法</p>";

function initKnowledgeContent() {
  var container = document.getElementById('knowledgeContent');
  container.innerHTML = KNOWLEDGE_HTML;
  // Wrap each chapter in a div for filtering
  var children = Array.from(container.children);
  container.innerHTML = '';
  var wrapper = null;
  children.forEach(function(el) {
    if (el.classList.contains('chapter-title')) {
      wrapper = document.createElement('div');
      wrapper.className = 'chapter-wrapper';
      wrapper.dataset.chapterId = el.id;
      container.appendChild(wrapper);
    }
    if (wrapper) { wrapper.appendChild(el); }
    else { container.appendChild(el); }
  });
  buildKnowledgeTree();
  setTimeout(function() {
    document.querySelectorAll('#knowledgeContent .chapter-wrapper').forEach(function(w) {
      w.classList.add('ch-enter');
    });
  }, 50);
}

function filterChapter(chapterId) {
  var wrappers = document.querySelectorAll('#knowledgeContent .chapter-wrapper');
  wrappers.forEach(function(w) {
    if (!chapterId || w.dataset.chapterId === chapterId) {
      w.style.display = 'block';
      w.classList.remove('ch-enter');
      void w.offsetWidth;
      w.classList.add('ch-enter');
    } else {
      w.classList.remove('ch-enter');
      w.style.display = 'none';
    }
  });
  document.querySelectorAll('.tree-item-header').forEach(function(h) { h.classList.remove('active-chapter'); });
  if (chapterId) {
    var hdr = document.querySelector('.tree-item-header[data-chapter="' + chapterId + '"]');
    if (hdr) hdr.classList.add('active-chapter');
  }
}

function buildKnowledgeTree() {
  var container = document.getElementById('sidebar-knowledge');
  var chapters = document.querySelectorAll('.chapter-title');
  var html = '<div class="tree">';

  // "全部章节" at top
  html += '<div class="tree-item">' +
    '<div class="tree-item-header" onclick="filterChapter(\'\')">' +
      '<span class="sidebar-text">📂 全部章节</span>' +
    '</div>' +
  '</div>';

  chapters.forEach(function(ch, idx) {
    var chText = ch.textContent;
    html += '<div class="tree-item">' +
      '<div class="tree-item-header" data-chapter="' + ch.id + '" onclick="filterChapter(' + "'" + ch.id + "'" + ')">' +
        '<i class="tree-arrow" onclick="toggleTree(this);event.stopPropagation();">▶</i>' +
        '<span class="sidebar-text">' + chText + '</span>' +
      '</div>' +
      '<div class="tree-children" id="tree-ch-' + idx + '">';

    var sib = ch.nextElementSibling;
    while (sib && !sib.classList.contains('chapter-title')) {
      if (sib.classList.contains('section-title') && sib.id) {
        html += '<button class="tree-leaf" onclick="scrollToSection(' + "'" + sib.id + "'" + ')">' +
          '<span class="sidebar-text">' + sib.textContent + '</span></button>';
        var subSib = sib.nextElementSibling;
        while (subSib && !subSib.classList.contains('chapter-title') && !subSib.classList.contains('section-title')) {
          if (subSib.classList.contains('subsection-title') && subSib.id) {
            html += '<button class="tree-leaf" style="padding-left:64px;font-size:11px;" onclick="scrollToSection(' + "'" + subSib.id + "'" + ')">' +
              '<span class="sidebar-text">' + subSib.textContent + '</span></button>';
          }
          subSib = subSib.nextElementSibling;
        }
      }
      sib = sib.nextElementSibling;
    }
    html += '</div></div>';
  });
  html += '</div>';
  container.innerHTML = html;
}function toggleTree(el) {
  // Toggle expand/collapse
  var icon = el;
  if (icon.tagName !== 'I') icon = el.querySelector('i');
  if (!icon) return;
  var children = icon.parentElement.nextElementSibling;
  if (!children) return;
  icon.classList.toggle('expanded');
  children.classList.toggle('open');
}


function scrollToSection(id) {
  var el = document.getElementById(id);
  if (el) {
    // Show parent chapter first
    var wrapper = el.closest('.chapter-wrapper');
    if (wrapper) filterChapter(wrapper.dataset.chapterId);
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    el.style.transition = 'background 0.6s, box-shadow 0.6s';
    el.style.background = 'rgba(78, 205, 196, 0.15)';
    el.style.boxShadow = 'inset 0 0 30px rgba(78, 205, 196, 0.1), 0 0 20px rgba(78, 205, 196, 0.05)';
    setTimeout(function() {
      el.style.background = '';
      el.style.boxShadow = '';
    }, 2000);
  }
  closeSidebar();
}function initSidebar() {
  // Show knowledge sidebar by default
  document.getElementById('sidebar-knowledge').style.display = 'block';
  initQbankSidebar();
  initPracticeSidebar();
}

function closeSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  if (window.innerWidth < 768) {
    sidebar.classList.remove('open');
    overlay.classList.remove('show');
  }

}

function toggleSidebar() {
  if (window.innerWidth < 768) return; // not on mobile
  document.body.classList.toggle('sidebar-collapsed');
  const icon = document.getElementById('sidebarToggleIcon');
  if (icon) {
    icon.textContent = document.body.classList.contains('sidebar-collapsed') ? '▶' : '◀';
  }
}

function initQbank() {
  const filter = document.getElementById('qbankFilter');
  filter.innerHTML = '<option value="all">全部工种</option>';
  WORK_TYPES.forEach(wt => {
    filter.innerHTML += `<option value="${wt}">${wt}</option>`;
  });
  // Populate custom dropdown panel
  const panel = document.getElementById('qbankSelectPanel');
  panel.innerHTML = '<div class="custom-select-option selected" data-value="all">全部工种</div>';
  WORK_TYPES.forEach(wt => {
    panel.innerHTML += `<div class="custom-select-option" data-value="${wt}">${wt}</div>`;
  });
  // Click handler via event delegation on panel
  panel.addEventListener('click', function(e) {
    const opt = e.target.closest('.custom-select-option');
    if (!opt) return;
    // Update hidden select
    filter.value = opt.dataset.value;
    state.currentQbankFilter = opt.dataset.value;
    // Update label
    document.getElementById('qbankSelectLabel').textContent = opt.textContent;
    // Update selected state
    panel.querySelectorAll('.custom-select-option').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    // Close dropdown
    document.getElementById('qbankSelectWrap').classList.remove('open');
    // Trigger render
    renderQbank();
  });
  filter.addEventListener('change', function() {
    state.currentQbankFilter = this.value;

function renderQbank() {
  // Reset all-answers toggle state
  allAnswersShown = false;
  const toggleBtn = document.getElementById('btnToggleAnswers');
  if (toggleBtn) {
    toggleBtn.textContent = '展开所有答案';
    toggleBtn.classList.remove('active');
  }

  const container = document.getElementById('qbankContent');
  const filter = state.currentQbankFilter;

  let filtered = filter === 'all' ? ALL_QUESTIONS : ALL_QUESTIONS.filter(q => q.work_type === filter);

  // Update stats
  const judgeCount = filtered.filter(q => q.type === 'judge').length;
  const singleCount = filtered.filter(q => q.type === 'single').length;
  document.getElementById('qbankStats').textContent = `共 ${filtered.length} 题（判断 ${judgeCount} 题，单选 ${singleCount} 题）`;

  // Group by work type, then by type
  const groups = {};
  filtered.forEach(q => {
    const key = q.work_type + '|' + q.type;
    if (!groups[key]) groups[key] = [];
    groups[key].push(q);
  });

  let html = '';
  for (const [key, qs] of Object.entries(groups)) {
    const [wt, type] = key.split('|');
    const typeLabel = type === 'judge' ? '判断题' : '单选题';
    html += `<div class="q-group">
      <div class="q-group-header">${wt} - ${typeLabel}（${qs.length}题）</div>`;

    qs.forEach((q, idx) => {
      html += `<div class="q-card">
        <div class="q-meta">
          <span class="q-type-badge ${type}">${typeLabel}</span>
          工种: ${q.work_type}
        </div>
        <div class="q-text">${idx+1}. ${q.text}</div>`;

      if (q.type === 'single' && q.options && q.options.length > 0) {
        html += `<div class="q-options">`;
        q.options.forEach(opt => {
          html += `<div>${opt}</div>`;
        });
        html += `</div>`;
      }

      html += `<button class="btn-answer" onclick="toggleAnswer(this)">显示答案</button>
        <div class="q-answer">正确答案：${q.answer}</div>
      </div>`;
    });

    html += '</div>';
  }

  if (!html) html = '<p style="color:var(--text-muted);text-align:center;padding:40px;">该筛选条件下无题目。</p>';
  container.innerHTML = html;

  // Fade-in animation same as knowledge chapter
  container.classList.remove('qfade');
  void container.offsetWidth;
  container.classList.add('qfade');

  // Add 3D tilt effect
  addCardTiltEffect();
}

function toggleAnswer(btn) {
  var answer = btn.nextElementSibling;
  if (answer.classList.contains('show')) {
    answer.classList.remove('show');
    answer.style.maxHeight = '';
    btn.textContent = '显示答案';
  } else {
    answer.classList.add('show');
    btn.textContent = '隐藏答案';
  }
}

let allAnswersShown = false;

function toggleAllAnswers() {

  }
}

function startPractice() {
  const wt = document.getElementById('practiceWorkType').value;
  const judgeCount = parseInt(document.getElementById('practiceJudgeCount').value) || 0;
  const singleCount = parseInt(document.getElementById('practiceSingleCount').value) || 0;

  if (judgeCount + singleCount === 0) { alert('请至少设置一题'); return; }

  let judgePool = ALL_QUESTIONS.filter(q => q.type === 'judge');
  let singlePool = ALL_QUESTIONS.filter(q => q.type === 'single');
  if (wt !== 'all') {
    judgePool = judgePool.filter(q => q.work_type === wt);
    singlePool = singlePool.filter(q => q.work_type === wt);
  }

  var selected;
  if (judgeCount > 0 && singleCount === 0) {
    // Judge only with dedup
    if (judgePool.length < judgeCount) { alert('判断题不足，仅有' + judgePool.length + '题'); return; }
    var usedJt = {}; selected = [];
    shuffleArray(judgePool).forEach(function(q) {
      if (selected.length < judgeCount && !usedJt[q.text]) { selected.push(q); usedJt[q.text] = true; }
    });
  } else if (singleCount > 0 && judgeCount === 0) {
    // Single only with dedup
    if (singlePool.length < singleCount) { alert('单选题不足，仅有' + singlePool.length + '题'); return; }
    var usedSt = {}; selected = [];
    shuffleArray(singlePool).forEach(function(q) {
      if (selected.length < singleCount && !usedSt[q.text]) { selected.push(q); usedSt[q.text] = true; }
    });
  } else {
    // Mixed
    var jc = Math.min(judgeCount, judgePool.length);
    var sc = Math.min(singleCount, singlePool.length);
    if (jc + sc === 0) { alert('该条件下没有题目'); return; }
    // Judges first, singles second
    var usedTxt = {};
    var jSel = [], sSel = [];
    shuffleArray(judgePool).forEach(function(q){if(jSel.length<jc&&!usedTxt[q.text]){jSel.push(q);usedTxt[q.text]=true;}});
    shuffleArray(singlePool).forEach(function(q){if(sSel.length<sc&&!usedTxt[q.text]){sSel.push(q);usedTxt[q.text]=true;}});
    selected = jSel.concat(sSel);
  }

  state.practiceQuestions = selected;
  state.practiceIndex = 0;
  state.practiceAnswers = new Array(selected.length).fill(null);
  state.practiceLocked = false;
  state.practiceDone = false;

  document.getElementById('practiceSetup').style.display = 'none';
  document.getElementById('practiceArea').style.display = 'block';

  renderPracticeQuestion();
  switchSubTab('practice-mode');
  closeSidebar();
}function renderPracticeQuestion() {
  const area = document.getElementById('practiceArea');
  const q = state.practiceQuestions[state.practiceIndex];
  const idx = state.practiceIndex;
  const total = state.practiceQuestions.length;
  const userAns = state.practiceAnswers[idx];
  const isLocked = state.practiceLocked || userAns !== null;

  if (state.practiceDone) {
    renderPracticeResult();
    return;
  }

  let html = `<div class="question-display">
    <div class="q-number">第 ${idx+1}/${total} 题 | ${q.work_type} | ${q.type === 'judge' ? '判断题' : '单选题'}</div>
    <div class="q-text">${q.text}</div>`;

  if (q.type === 'single' && q.options && q.options.length > 0) {
    q.options.forEach(opt => {
      const letter = opt.charAt(0);
      const selected = userAns === letter ? ' selected' : '';
      const locked = isLocked ? ' locked' : '';
      let extra = '';
      if (isLocked && userAns !== null) {
        if (letter === q.answer) extra += ' correct';
        if (userAns === letter && letter !== q.answer) extra += ' wrong';
      }
      html += `<button class="q-option${selected}${locked}${extra}" onclick="practiceSelect('${letter}')" ${isLocked ? 'disabled' : ''}>
        ${opt}
      </button>`;
    });
  } else {
    // Judge type
    const selectedTrue = userAns === '对' ? ' selected' : '';
    const selectedFalse = userAns === '错' ? ' selected' : '';
    const locked = isLocked ? ' locked' : '';
    let extraT = '', extraF = '';
    if (isLocked && userAns !== null) {
      if (q.answer === '对') extraT += ' correct';
      else extraF += ' correct';
      if (userAns === '对' && q.answer !== '对') extraT += ' wrong';
      if (userAns === '错' && q.answer !== '错') extraF += ' wrong';
    }
    html += `<button class="q-option${selectedTrue}${locked}${extraT}" onclick="practiceSelect('对')" ${isLocked ? 'disabled' : ''}>对</button>
    <button class="q-option${selectedFalse}${locked}${extraF}" onclick="practiceSelect('错')" ${isLocked ? 'disabled' : ''}>错</button>`;
  }

  // Feedback
  if (isLocked && userAns !== null) {
    const isCorrect = userAns === q.answer;
    const cls = isCorrect ? 'correct' : 'wrong';
    html += `<div class="q-feedback ${cls}">
      ${isCorrect ? '✅ 回答正确！' : '❌ 回答错误。'} 正确答案：${q.answer}
    </div>`;
  }

  html += `</div>

  <div class="question-nav">
    <button onclick="practiceGoTo(${idx-1})" ${idx === 0 ? 'disabled' : ''}>◀ 上一题</button>
    <button onclick="practiceGoTo(${idx+1})" ${idx >= total-1 ? 'disabled' : ''}>下一题 ▶</button>
    <button class="primary" onclick="finishPractice()" style="margin-left:auto;">完成并查看结果</button>
  </div>`;

  if (isLocked) {
    html += `<div style="text-align:center;color:var(--text-muted);font-size:12px;margin-top:8px;">
      本题已作答，答案已锁定。使用上一题/下一题浏览。
    </div>`;
  }

  area.innerHTML = html;
}

function practiceSelect(answer) {
  const idx = state.practiceIndex;
  if (state.practiceLocked || state.practiceAnswers[idx] !== null) return;

  state.practiceAnswers[idx] = answer;
  const q = state.practiceQuestions[idx];
  const isCorrect = answer === q.answer;

  // Add to wrong book if wrong
  if (!isCorrect) {
    addToWrongBook(q);
  }

  renderPracticeQuestion();
}

function practiceGoTo(newIdx) {
  if (newIdx < 0 || newIdx >= state.practiceQuestions.length) return;
  state.practiceIndex = newIdx;
  renderPracticeQuestion();
}

function finishPractice() {
  const total = state.practiceQuestions.length;
  const answered = state.practiceAnswers.filter(a => a !== null).length;

  if (answered < total) {
    if (!confirm(`还有 ${total - answered} 题未作答，确定要完成吗？`)) return;
  }

  state.practiceLocked = true;
  state.practiceDone = true;
  renderPracticeResult();
}

function renderPracticeResult() {
  const total = state.practiceQuestions.length;
  let correct = 0;
  const wrongList = [];

  state.practiceQuestions.forEach((q, i) => {
    if (state.practiceAnswers[i] === q.answer) {
      correct++;
    } else if (state.practiceAnswers[i] !== null) {
      wrongList.push({q, userAnswer: state.practiceAnswers[i]});
    }
  });

  const rate = total > 0 ? Math.round(correct / total * 100) : 0;

  let html = `<div class="stats-box">
    <div class="big-number">${rate}%</div>
    <div style="font-size:14px;color:var(--text-muted);margin-top:4px;">正确率</div>
    <div class="stats-detail">
      <div class="stat-item"><span class="num" style="color:var(--accent-green);">${correct}</span><span class="label">正确</span></div>
      <div class="stat-item"><span class="num" style="color:var(--accent-red);">${total - correct}</span><span class="label">错误</span></div>
      <div class="stat-item"><span class="num" style="color:var(--accent-blue);">${total}</span><span class="label">总题</span></div>
    </div>
  </div>

  <div class="question-nav" style="justify-content:center;">
    <button onclick="resetPractice()">🔄 重新刷题</button>
    <button onclick="showWrongBook()">📑 查看错题</button>
  </div>`;

  // Show wrong answers
  if (wrongList.length > 0) {
    html += '<h3 style="color:var(--accent-red);margin:20px 0 10px;">错题回顾</h3>';
    wrongList.forEach((item, i) => {
      html += `<div class="q-card">
        <div class="q-text">${item.q.text}</div>
        <div style="font-size:12px;color:var(--accent-red);">你的答案：${item.userAnswer}</div>
        <div style="font-size:12px;color:var(--accent-green);">正确答案：${item.q.answer}</div>
      </div>`;
    });
  }

  document.getElementById('practiceArea').innerHTML = html;
}

function resetPractice() {
  state.practiceQuestions = [];
  state.practiceAnswers = [];
  state.practiceIndex = 0;
  state.practiceLocked = false;
  state.practiceDone = false;

  document.getElementById('practiceSetup').style.display = 'block';
  document.getElementById('practiceArea').style.display = 'none';
}
