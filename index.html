<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工训机考复习</title>

<style>
/* ===== GLOBAL RESET & VARIABLES ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #0f1320;
  --bg-secondary: #161b2e;
  --bg-card: #1a2140;
  --bg-sidebar: #0a0f1e;
  --text-primary: #e0e4f0;
  --text-secondary: #9aa4c8;
  --text-muted: #5a6488;
  --accent-green: #4ecdc4;
  --accent-blue: #5b8def;
  --accent-orange: #f0a030;
  --accent-red: #e85550;
  --accent-purple: #8b5cf6;
  --border-color: #1e2a50;
  --sidebar-width: 320px;
  --sidebar-collapsed: 80px;
  --header-height: 52px;
  --radius: 8px;
  --transition: 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  --glow-green: rgba(78, 205, 196, 0.3);
}
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(78, 205, 196, 0.07) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(91, 141, 239, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(240, 160, 48, 0.04) 0%, transparent 50%),
    linear-gradient(135deg, #070b17 0%, #0f1426 30%, #0a0f1e 60%, #0f1a2e 100%);
  background-attachment: fixed;
  color: var(--text-primary);
  line-height: 1.7;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden auto;
}
a { color: var(--accent-blue); text-decoration: none; }
a:hover { color: var(--accent-green); }

/* ===== TOP NAV ===== */
.top-nav {
  width: 100%;
  max-width: 1064px;
  display: flex;
  justify-content: center;
  padding: 32px 32px 16px;
  flex-shrink: 0;
  pointer-events: none;
}
.nav-inner {
  position: relative;
  display: flex;
  justify-content: center;
  gap: 2px;
  padding: 6px 6px;
  background: rgba(8, 12, 25, 0.4);
  backdrop-filter: blur(16px) saturate(200%);
  -webkit-backdrop-filter: blur(16px) saturate(200%);
  border: 1px solid rgba(78, 205, 196, 0.08);
  border-radius: 16px;
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3), 0 0 20px rgba(78, 205, 196, 0.03);
  pointer-events: auto;
}
.nav-btn {
  padding: 7px 22px 9px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 500;
  transition: color 0.2s ease;
  position: relative;
  z-index: 2;
  white-space: nowrap;
}
.nav-btn:hover { color: var(--text-primary); }
.nav-btn.active { color: var(--accent-green); }

/* Sliding block */
.nav-slider {
  position: absolute;
  top: 4px;
  bottom: 4px;
  left: 6px;
  background: linear-gradient(135deg, rgba(78, 205, 196, 0.15), rgba(78, 205, 196, 0.08));
  border: 1px solid rgba(78, 205, 196, 0.25);
  border-radius: 10px;
  transition: left 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 1;
  box-shadow: 0 0 20px var(--glow-green), inset 0 1px 0 rgba(78, 205, 196, 0.15);
}

/* Keep button text above slider */
.nav-btn {
  z-index: 2;
  position: relative;
}

/* ===== APP BODY (sidebar + content) ===== */
.app-body {
  display: flex;
  flex: 1;
  min-height: 0;
  perspective: 1200px;
  perspective-origin: center;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar-width);
  flex-shrink: 0;
  background: rgba(8, 12, 25, 0.35);
  backdrop-filter: blur(20px) saturate(200%);
  -webkit-backdrop-filter: blur(20px) saturate(200%);
  display: flex;
  flex-direction: column;
  transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  margin: 32px 12px 32px 32px;
  border-radius: 14px;
  border: 1px solid rgba(78, 205, 196, 0.08);
  box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(78, 205, 196, 0.03);
}
.sidebar-header {
  padding: 12px 14px;
  border-bottom: 1px solid rgba(78, 205, 196, 0.06);
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 52px;
  background: rgba(255, 255, 255, 0.02);
}
.sidebar-header .logo-icon {
  font-size: 20px;
  color: var(--accent-green);
  flex-shrink: 0;
  width: 32px;
  text-align: center;
}
.sidebar-header h1 {
  font-size: 16px;
  color: var(--accent-green);
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  transition: var(--transition);
}
.sidebar-toggle {
  margin-left: auto;
  background: none;
  border: 1px solid var(--border-color);
  color: var(--text-muted);
  width: 28px;
  height: 28px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  flex-shrink: 0;
  font-size: 12px;
}
.sidebar-toggle:hover {
  color: var(--accent-green);
  border-color: var(--accent-green);
  box-shadow: 0 0 8px var(--glow-green);
}
.sidebar-text {
  transition: opacity 0.15s ease;
  white-space: nowrap;
}

/* Collapsed state */
.sidebar-collapsed .sidebar {
  width: var(--sidebar-collapsed);
  margin: 32px 12px 32px 32px;
}
.sidebar-collapsed .sidebar-text {
  opacity: 0;
  width: 0;
  display: inline-block;
  overflow: hidden;
  pointer-events: none;
}
.sidebar-collapsed .sidebar-header h1 {
  opacity: 0;
  width: 0;
  overflow: hidden;
}
.sidebar-collapsed .sidebar-toggle {
  margin-left: auto;
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  background: rgba(10, 15, 30, 0.6);
  border: 1px solid rgba(78, 205, 196, 0.08);
  border-radius: 6px;
  z-index: 10;
}
.sidebar-collapsed .sidebar-header {
  padding: 12px 6px;
  justify-content: center;
  gap: 4px;
}
.sidebar-collapsed .sidebar-toggle:hover {
  border-color: var(--accent-green);
  box-shadow: 0 0 12px var(--glow-green);
}
.sidebar-collapsed .tree-item-header {
  padding: 8px 10px;
  justify-content: center;
}
.sidebar-collapsed .tree-item-header .sidebar-text {
  display: none;
}
.sidebar-collapsed .sidebar-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 8px 0;
}
.sidebar-content::-webkit-scrollbar { width: 4px; }
.sidebar-content::-webkit-scrollbar-track { background: transparent; }
.sidebar-content::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

/* ===== MAIN CONTENT ===== */
.main-content {
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: padding 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.content-inner {
  width: 100%;
  max-width: 1000px;
  padding: 20px 32px 60px;
  background: rgba(10, 15, 30, 0.3);
  backdrop-filter: blur(12px) saturate(150%);
  -webkit-backdrop-filter: blur(12px) saturate(150%);
  border-radius: var(--radius);
  border: 1px solid rgba(78, 205, 196, 0.06);
  box-shadow: 0 8px 40px rgba(0, 0, 0, 0.2);
}
</style>
</head>
<body>
  <p>placeholder</p>
</body>
</html>
